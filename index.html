              const headers = sec.columns.map(c => c.label);
              TemplateHelper.parseUpload(e.target.files[0], headers, function(rows) {
                rows.forEach(row => {
                  const rowData = {};
                  sec.columns.forEach(c => { rowData[c.key] = row[c.label] || ""; });
                  if (sec.cardLayout) {
                    self._addCard(sec.key, sec.columns, rowData);
                  } else {
                    const tbody = document.getElementById("tbody-" + sec.key);
                    if (tbody) {
                      const tr = document.createElement("tr");
                      let trHtml = "";
                      sec.columns.forEach(c => {

                        } else {
                          trHtml += '<td style="border:1px solid #EEE;padding:2px 4px;"><input type="' + (c.inputType || "text") + '" style="width:100%;padding:4px;border:1px solid #CCC;border-radius:3px;font-size:13px;min-height:32px;" data-col="' + c.key + '" value="' + val.replace(/"/g, '&quot;') + '" placeholder="' + (c.placeholder || '') + '"></td>';
                        }
                      });
                      trHtml += '<td style="border:1px solid #EEE;padding:2px 4px;text-align:center;"><button onclick="this.closest(\'tr\').remove()" style="background:none;border:none;color:#D13212;cursor:pointer;font-size:16px;min-width:32px;min-height:32px;">✕</button></td>';

                      tbody.appendChild(tr);

                  }
                });

              });
              e.target.value = "";
            });
          }
        });
      },

      _buildRow(secKey, columns) {
        const cols = typeof columns === "string" ? JSON.parse(columns) : columns;
        let html = "<tr>";
        cols.forEach(c => {
          if (c.inputType === "select") {
            html += `<td style="border:1px solid #EEE;padding:2px 4px;"><select style="width:100%;padding:4px;border:1px solid #CCC;border-radius:3px;font-size:13px;min-height:32px;" data-col="${c.key}"><option value="">—</option>${(c.options || []).map(o => `<option value="${o}">${o}</option>`).join("")}</select></td>`;
          } else {
            html += `<td style="border:1px solid #EEE;padding:2px 4px;"><input type="${c.inputType || "text"}" style="width:100%;padding:4px;border:1px solid #CCC;border-radius:3px;font-size:13px;min-height:32px;" data-col="${c.key}" placeholder="${c.placeholder || ""}"></td>`;
          }
        });
        html += `<td style="border:1px solid #EEE;padding:2px 4px;text-align:center;"><button onclick="this.closest('tr').remove()" style="background:none;border:none;color:#D13212;cursor:pointer;font-size:16px;min-width:32px;min-height:32px;">✕</button></td></tr>`;
        return html;
      },

      _addCard(secKey, columns, data) {
        const container = document.getElementById("cards-" + secKey);
        if (!container) return;
        const card = document.createElement("div");
        card.className = "sa-card";
        const idx = container.children.length + 1;
        let html = '<div class="sa-card-header"><span class="sa-card-num">#' + idx + '</span><button onclick="this.closest(\'.sa-card\').remove()" class="sa-card-remove" title="Remove">✕</button></div>';
        html += '<div class="sa-card-fields">';
        columns.forEach(c => {
          const val = data ? (data[c.key] || "") : "";
          const isWide = c.label.length > 50;
          html += '<div class="sa-field' + (isWide ? ' sa-field-wide' : '') + '">';
          html += '<label class="sa-field-label">' + c.label + '</label>';
          if (c.key === "groupPath") {
            // Searchable group path dropdown
            const md = StateStore.state.masterData || {};
            const root = md.rootGroupPath || "Root";
            const paths = [root];
            (md.groups || []).forEach(g => { if (g.fullPath) paths.push(g.fullPath); });
            const gpOpts = paths.map(p => ({ value: p, label: p }));
            html += SearchableSelect.buildSingle(gpOpts, val, "groupPath", "— Select Group —");
          } else if (c.inputType === "select") {
            html += '<select style="width:100%;padding:4px;border:1px solid #CCC;border-radius:3px;font-size:13px;min-height:32px;" data-col="' + c.key + '"><option value="">—</option>' + (c.options || []).map(o => '<option value="' + o + '"' + (val === o ? ' selected' : '') + '>' + o + '</option>').join("") + '</select>';
          } else {
            html += '<input type="' + (c.inputType || "text") + '" style="width:100%;padding:4px;border:1px solid #CCC;border-radius:3px;font-size:13px;min-height:32px;" data-col="' + c.key + '" value="' + (val || "").replace(/"/g, '&quot;') + '" placeholder="' + (c.placeholder || '') + '">';
          }
          html += '</div>';
        });
        html += '</div>';
        card.innerHTML = html;
        container.appendChild(card);
        SearchableSelect.initAll(card);
      },

      _readCards(secKey) {
        const container = document.getElementById("cards-" + secKey);
        if (!container) return [];
        const rows = [];
        container.querySelectorAll(".sa-card").forEach(card => {
          const row = {};
          card.querySelectorAll("input, select").forEach(el => {
            if (el.dataset.col) row[el.dataset.col] = el.value;
          });
          rows.push(row);
        });
        return rows;
      },

      _readTable(secKey) {
        const tbody = document.getElementById("tbody-" + secKey);
        if (!tbody) return [];
        const rows = [];
        tbody.querySelectorAll("tr").forEach(tr => {
          const row = {};
          tr.querySelectorAll("input, select").forEach(el => { row[el.dataset.col] = el.value; });
          rows.push(row);
        });
        return rows;
      },

      _writeTable(secKey, data, columns) {
        const tbody = document.getElementById("tbody-" + secKey);
        if (!tbody || !data) return;
        data.forEach(row => {
          const tr = document.createElement("tr");
          let html = "";
          columns.forEach(c => {
            const val = row[c.key] || "";
            if (c.inputType === "select") {
              html += `<td style="border:1px solid #EEE;padding:2px 4px;"><select style="width:100%;padding:4px;border:1px solid #CCC;border-radius:3px;font-size:13px;min-height:32px;" data-col="${c.key}"><option value="">—</option>${(c.options || []).map(o => `<option value="${o}" ${val === o ? "selected" : ""}>${o}</option>`).join("")}</select></td>`;
            } else {
              html += `<td style="border:1px solid #EEE;padding:2px 4px;"><input type="${c.inputType || "text"}" style="width:100%;padding:4px;border:1px solid #CCC;border-radius:3px;font-size:13px;min-height:32px;" data-col="${c.key}" value="${(val).replace(/"/g, "&quot;")}" placeholder="${c.placeholder || ""}"></td>`;
            }
          });
          html += `<td style="border:1px solid #EEE;padding:2px 4px;text-align:center;"><button onclick="this.closest('tr').remove()" style="background:none;border:none;color:#D13212;cursor:pointer;font-size:16px;min-width:32px;min-height:32px;">✕</button></td>`;
          tr.innerHTML = html;
          tbody.appendChild(tr);
        });
      },

      validate() {
        const errors = [];
        config.sections.forEach(sec => {
          if (sec.type === "form") {
            sec.fields.forEach(f => {
              if (f.required) {
                const el = document.getElementById("inp-" + config.id + "-" + f.key);
                if (el && !el.value.trim()) {
                  const fg = document.getElementById("fg-" + config.id + "-" + f.key);
                  if (fg) fg.classList.add("has-error");
                  errors.push(f.label + " is required");
                }
                if (el && f.inputType === "email" && el.value.trim() && !VALIDATION_RULES.email(el.value)) {
                  const fg = document.getElementById("fg-" + config.id + "-" + f.key);
                  if (fg) { fg.classList.add("has-error"); fg.querySelector(".error-msg").textContent = "Please enter a valid email address"; }
                  errors.push("Invalid email: " + f.label);
                }
              }
            });
          }
        });
        if (errors.length) { const fe = document.querySelector(".has-error"); if (fe) fe.scrollIntoView({behavior:"smooth",block:"center"}); }
        return { valid: errors.length === 0, errors };
      },

      getData() {
        const d = {};
        config.sections.forEach(sec => {
          if (sec.type === "table") {
            d[sec.key] = sec.cardLayout ? this._readCards(sec.key) : this._readTable(sec.key);
          } else if (sec.type === "form") {
            sec.fields.forEach(f => {
              const el = document.getElementById("inp-" + config.id + "-" + f.key);
              if (el) d[f.key] = el.value;
            });
          }
        });
        return d;
      },

      setData(data) {
        if (!data) return;
        config.sections.forEach(sec => {
          if (sec.type === "table" && data[sec.key]) {
            if (sec.cardLayout) {
              data[sec.key].forEach(row => this._addCard(sec.key, sec.columns, row));
            } else {
              this._writeTable(sec.key, data[sec.key], sec.columns);
            }
          } else if (sec.type === "form") {
            sec.fields.forEach(f => {
              const el = document.getElementById("inp-" + config.id + "-" + f.key);
              if (el && data[f.key] !== undefined) el.value = data[f.key];
            });
          }
        });
      },
    };
  }

  /* ==========================================================
     Searchable Select Utility — type-to-filter for all dropdowns
     ========================================================== */

  const SearchableSelect = {
    // Single-select: returns HTML string, call .init() after DOM insert
    buildSingle(options, selectedVal, dataCol, placeholder) {
      placeholder = placeholder || "— Select —";
      const id = "ss-" + Math.random().toString(36).substr(2, 8);
      const selOpt = options.find(o => o.value === selectedVal);
      let html = '<div class="ss-wrap" id="' + id + '" data-ss="single">';
      html += '<div class="ss-display" tabindex="0">' + (selOpt ? this._esc(selOpt.label) : '<span class="ss-placeholder">' + placeholder + '</span>') + '</div>';
      html += '<input type="hidden" data-col="' + dataCol + '" value="' + (selectedVal || '') + '">';
      html += '<div class="ss-panel"><input class="ss-search" placeholder="Type to search..." autocomplete="off"><div class="ss-list">';
      html += '<div class="ss-opt" data-val="">' + placeholder + '</div>';
      options.forEach(o => {
        html += '<div class="ss-opt' + (o.value === selectedVal ? ' ss-selected' : '') + '" data-val="' + this._esc(o.value) + '" data-search="' + this._esc((o.label + ' ' + o.value).toLowerCase()) + '">' + this._esc(o.label) + '</div>';
      });
      html += '</div></div></div>';
      return html;
    },

    // Multi-select: returns HTML string for checkbox-based multi-select with search
    buildMulti(options, selectedVals, dataCol, placeholder) {
      placeholder = placeholder || "— Select —";
      const id = "ss-" + Math.random().toString(36).substr(2, 8);
      selectedVals = selectedVals || [];
      let html = '<div class="ss-wrap" id="' + id + '" data-col="' + dataCol + '" data-ss="multi" data-multi="1">';
      html += '<div class="ss-display" tabindex="0">';
      html += selectedVals.length ? selectedVals.map(v => '<span class="ss-tag">' + this._esc(v) + '</span>').join('') : '<span class="ss-placeholder">' + placeholder + '</span>';
      html += '</div>';
      html += '<div class="ss-panel"><input class="ss-search" placeholder="Type to search..." autocomplete="off"><div class="ss-list">';
      options.forEach(o => {
        const chk = selectedVals.includes(o.value) ? ' checked' : '';
        html += '<div class="ss-opt" data-val="' + this._esc(o.value) + '" data-search="' + this._esc((o.label + ' ' + o.value).toLowerCase()) + '"><input type="checkbox" class="sa-approver-cb" value="' + this._esc(o.value) + '"' + chk + '> ' + this._esc(o.label) + '</div>';
      });
      html += '</div></div></div>';
      return html;
    },

    // Call after DOM is ready to wire up all searchable selects in a container
    initAll(container) {
      container.querySelectorAll('[data-ss]').forEach(wrap => {
        if (wrap.dataset.ssInit) return;
        wrap.dataset.ssInit = "1";
        const isSingle = wrap.dataset.ss === "single";
        const display = wrap.querySelector('.ss-display');
        const panel = wrap.querySelector('.ss-panel');
        const search = wrap.querySelector('.ss-search');
        const list = wrap.querySelector('.ss-list');
        const hidden = wrap.querySelector('input[type="hidden"]');

        // Toggle panel
        display.addEventListener('click', (e) => {
          // Close all other open panels first
          document.querySelectorAll('.ss-panel.ss-open').forEach(p => { if (p !== panel) { p.classList.remove('ss-open'); p.style.display = 'none'; } });
          const isOpen = panel.classList.contains('ss-open');
          if (isOpen) {
            panel.classList.remove('ss-open');
            panel.style.display = 'none';
          } else {
            // Position fixed relative to the display trigger
            const rect = display.getBoundingClientRect();
            panel.style.left = rect.left + 'px';
            panel.style.width = Math.max(rect.width, 250) + 'px';
            // Check if there's room below, otherwise open above
            const spaceBelow = window.innerHeight - rect.bottom;
            if (spaceBelow < 200 && rect.top > 200) {
              panel.style.bottom = (window.innerHeight - rect.top + 2) + 'px';
              panel.style.top = 'auto';
            } else {
              panel.style.top = (rect.bottom + 2) + 'px';
              panel.style.bottom = 'auto';
            }
            panel.classList.add('ss-open');
            panel.style.display = 'block';
            search.value = ''; this._filterList(list, ''); search.focus();
          }
        });

        // Search filter
        search.addEventListener('input', () => { this._filterList(list, search.value); });

        // Prevent panel close when clicking inside
        panel.addEventListener('click', (e) => e.stopPropagation());

        if (isSingle) {
          // Single select: click option to select
          list.querySelectorAll('.ss-opt').forEach(opt => {
            opt.addEventListener('click', () => {
              const val = opt.dataset.val;
              if (hidden) { hidden.value = val; hidden.dispatchEvent(new Event('change', {bubbles:true})); }
              list.querySelectorAll('.ss-opt').forEach(o => o.classList.remove('ss-selected'));
              if (val) opt.classList.add('ss-selected');
              display.innerHTML = val ? this._esc(opt.textContent) : '<span class="ss-placeholder">' + (display.querySelector('.ss-placeholder')?.textContent || '— Select —') + '</span>';
              panel.classList.remove('ss-open');
              panel.style.display = 'none';
            });
          });
        } else {
          // Multi select: checkbox toggle
          list.querySelectorAll('.ss-opt').forEach(opt => {
            const cb = opt.querySelector('input[type="checkbox"]');
            opt.addEventListener('click', (e) => {
              if (e.target !== cb) cb.checked = !cb.checked;
              this._updateMultiDisplay(wrap);
              wrap.dispatchEvent(new Event('ss-change', {bubbles:true}));
            });
          });
        }
      });

      // Close panels on outside click
      if (!SearchableSelect._globalClose) {
        SearchableSelect._globalClose = true;
        document.addEventListener('click', (e) => {
          if (!e.target.closest('.ss-wrap')) {
            document.querySelectorAll('.ss-panel.ss-open').forEach(p => { p.classList.remove('ss-open'); p.style.display = 'none'; });
          }
        });
        // Close panels on scroll to prevent misalignment
        window.addEventListener('scroll', (e) => {
          // Don't close if scrolling inside the dropdown panel itself
          if (e.target && e.target.closest && e.target.closest('.ss-panel')) return;
          document.querySelectorAll('.ss-panel.ss-open').forEach(p => { p.classList.remove('ss-open'); p.style.display = 'none'; });
        }, true);
      }
    },

    _filterList(list, query) {
      const q = query.toLowerCase().trim();
      let visible = 0;
      list.querySelectorAll('.ss-opt').forEach(opt => {
        if (!opt.dataset.search) { opt.classList.toggle('ss-hidden', q !== ''); return; }
        const match = !q || opt.dataset.search.includes(q);
        opt.classList.toggle('ss-hidden', !match);
        if (match) visible++;
      });
      // Show/remove empty message
      let empty = list.querySelector('.ss-empty');
      if (visible === 0 && q) {
        if (!empty) { empty = document.createElement('div'); empty.className = 'ss-empty'; list.appendChild(empty); }
        empty.textContent = 'No matches for "' + query + '"';
        empty.style.display = '';
      } else if (empty) { empty.style.display = 'none'; }
    },

    _updateMultiDisplay(wrap) {
      const display = wrap.querySelector('.ss-display');
      const selected = [];
      wrap.querySelectorAll('.sa-approver-cb:checked').forEach(cb => selected.push(cb.value));
      display.innerHTML = selected.length
        ? selected.map(v => '<span class="ss-tag">' + this._esc(v) + '</span>').join('')
        : '<span class="ss-placeholder">— Select approver(s) —</span>';
    },

    _esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; },
  };

  /* ==========================================================
     TASK 11.2 — Spending Approvals & Controls (Category 3)
     ========================================================== */

  const SpendingApprovalsStep = {
    id: "cat-3", label: CAT_NAMES[3], categoryId: 3,
    _sections: null,

    _getGroupPathOptions() {
      const md = StateStore.state.masterData || {};
      const root = md.rootGroupPath || "Root";
      const opts = [root + " (ROOT Level)"];
      (md.groups || []).forEach(g => { if (g.fullPath) opts.push(g.fullPath); });
      return opts;
    },

    _getUploadedUsers() {
      const usersData = StateStore.state.stepData && StateStore.state.stepData["cat-0"];
      if (!usersData || !usersData.uploader || !usersData.uploader.mappedData) return [];
      return usersData.uploader.mappedData.filter(u => u.email && u.email.trim());
    },

    _updateMultiSelect(cb) {
      const wrapper = cb.closest('[data-multi="1"]');
      if (!wrapper) return;
      const selected = [];
      wrapper.querySelectorAll('.sa-approver-cb:checked').forEach(c => selected.push(c.value));
      const display = wrapper.querySelector('.sa-multi-sel');
      if (display) {
        display.innerHTML = selected.length
          ? selected.map(e => '<span style="background:#E8F5E9;padding:1px 6px;border-radius:3px;font-size:11px;">' + e + '</span>').join('')
          : '<span style="color:#999;">— Select approver(s) —</span>';
      }
    },

    _buildGroupSelect(secKey, rowIdx, colKey, selectedVal) {
      const opts = this._getGroupPathOptions();
      const options = opts.map(o => ({ value: o, label: o }));
      return SearchableSelect.buildSingle(options, selectedVal, colKey, "— Select Group —");
    },

    _buildInput(col, val) {
      val = val || "";
      // Auto-populated read-only fields (first/last name from email selection)
      if (col.readOnly && col.autoFrom) {
        return '<input type="text" style="width:100%;padding:4px;border:1px solid #CCC;border-radius:3px;font-size:13px;min-height:32px;background:#F0F0F0;color:#555;" data-col="' + col.key + '" data-auto-from="' + col.autoFrom + '" value="' + (val || "").replace(/"/g, '&quot;') + '" readonly placeholder="Auto-filled when approvers are selected">';
      }
      // User email filtered by selected group
      if (col.source === "userEmailByGroup") {
        const users = this._getUploadedUsers();
        const options = users.map(u => {
          const email = u.email || "";
          const label = u.firstName ? email + " (" + u.firstName + " " + (u.lastName || "") + ")" : email;
          return { value: email, label: label };
        });
        return SearchableSelect.buildSingle(options, val, col.key, "— Select User Email —");
      }
      // User-sourced fields: render as searchable dropdown from uploaded user data
      if (col.source === "userEmail" || col.source === "userFirstName" || col.source === "userLastName" || col.source === "approverEmails") {
        const users = this._getUploadedUsers();
        if (col.source === "approverEmails") {
          // Multi-select approver emails (comma-separated, max 6)
          const selected = val ? val.split(",").map(s => s.trim()).filter(Boolean) : [];
          const options = users.map(u => {
            const email = u.email || "";
            const label = u.firstName ? email + " (" + u.firstName + " " + (u.lastName || "") + ")" : email;
            return { value: email, label: label };
          });
          return SearchableSelect.buildMulti(options, selected, col.key, "— Select approver(s) —");
        }
        // Single-select user field
        const options = users.map(u => {
          let optVal, optLabel;
          if (col.source === "userEmail") { optVal = u.email; optLabel = u.email + (u.firstName ? " (" + u.firstName + " " + (u.lastName || "") + ")" : ""); }
          else if (col.source === "userFirstName") { optVal = u.firstName; optLabel = u.firstName || ""; }
          else if (col.source === "userLastName") { optVal = u.lastName; optLabel = u.lastName || ""; }
          return { value: optVal || "", label: optLabel || "" };
        }).filter(o => o.value);
        return SearchableSelect.buildSingle(options, val, col.key, "— Select —");
      }
      if (col.inputType === "select") {
        let html = '<select style="width:100%;padding:4px;border:1px solid #CCC;border-radius:3px;font-size:13px;min-height:32px;" data-col="' + col.key + '">';
        html += '<option value="">—</option>';
        (col.options || []).forEach(o => {
          html += '<option value="' + o + '"' + (val === o ? ' selected' : '') + '>' + o + '</option>';
        });
        html += '</select>';
        return html;
      }
      return '<input type="' + (col.inputType || "text") + '" style="width:100%;padding:4px;border:1px solid #CCC;border-radius:3px;font-size:13px;min-height:32px;" data-col="' + col.key + '" value="' + val.replace(/"/g, '&quot;') + '" placeholder="' + (col.placeholder || '') + '">';
    },

    _addRow(secKey, columns, data) {
      const container = document.getElementById("cards-" + secKey);
      if (!container) return;
      const card = document.createElement("div");
      card.className = "sa-card";
      const idx = container.children.length + 1;
      let html = '<div class="sa-card-header"><span class="sa-card-num">#' + idx + '</span><button onclick="this.closest(\'.sa-card\').remove();SpendingApprovalsStep._renumberCards(\'' + secKey + '\')" class="sa-card-remove" title="Remove">✕</button></div>';
      html += '<div class="sa-card-fields">';
      columns.forEach(c => {
        const val = data ? (data[c.key] || "") : "";
        const isWide = c.key === "approverEmails" || c.key === "approverLastName";
        html += '<div class="sa-field' + (isWide ? ' sa-field-wide' : '') + '">';
        html += '<label class="sa-field-label">' + c.label + '</label>';
        if (c.key === "groupPath") {
          html += this._buildGroupSelect(secKey, container.children.length, c.key, val);
        } else {
          html += this._buildInput(c, val);
        }
        html += '</div>';
      });
      html += '</div>';
      card.innerHTML = html;
      container.appendChild(card);
      SearchableSelect.initAll(card);

      // Wire auto-populate: when userEmail changes, fill firstName/lastName
      const emailHidden = card.querySelector('input[type="hidden"][data-col="userEmail"]');
      if (emailHidden) {
        emailHidden.addEventListener('change', () => {
          const email = emailHidden.value;
          const users = this._getUploadedUsers();
          const user = users.find(u => u.email === email);
          card.querySelectorAll('[data-auto-from="userEmail"]').forEach(inp => {
            if (inp.dataset.col === "firstName") inp.value = user ? (user.firstName || "") : "";
            if (inp.dataset.col === "lastName") inp.value = user ? (user.lastName || "") : "";
          });
        });
      }

      // Wire group change: rebuild email dropdown to show only users in selected group
      const groupHidden = card.querySelector('input[type="hidden"][data-col="groupPath"]');
      if (groupHidden && secKey === "customApprovals") {
        groupHidden.addEventListener('change', () => {
          const selectedGroup = groupHidden.value;
          const emailHiddenEl = card.querySelector('input[type="hidden"][data-col="userEmail"]');
          const emailWrap = emailHiddenEl ? emailHiddenEl.closest('[data-ss="single"]') : null;
          if (!emailWrap) return;
          // Get users and filter by group assignment
          const allUsers = this._getUploadedUsers();
          const usersData = StateStore.state.stepData && StateStore.state.stepData["cat-0"];
          const ga = usersData && usersData.groupAssigner && usersData.groupAssigner.assignments || {};
          const filtered = allUsers.filter((u, i) => {
            const assign = ga[i];
            if (!selectedGroup) return true;
            if (Array.isArray(assign)) return assign.some(p => (typeof p === "string" ? p : p.group) === selectedGroup);
            return assign === selectedGroup || !assign;
          });
          // Rebuild the options list
          const list = emailWrap.querySelector('.ss-list');
          if (list) {
            list.innerHTML = '<div class="ss-opt" data-val="">— Select User Email —</div>';
            filtered.forEach(u => {
              const email = u.email || "";
              const label = u.firstName ? email + " (" + u.firstName + " " + (u.lastName || "") + ")" : email;
              const opt = document.createElement('div');
              opt.className = 'ss-opt';
              opt.dataset.val = email;
              opt.dataset.search = (label + ' ' + email).toLowerCase();
              opt.textContent = label;
              opt.addEventListener('click', () => {
                const hidden = emailWrap.querySelector('input[type="hidden"]');
                if (hidden) { hidden.value = email; hidden.dispatchEvent(new Event('change', {bubbles:true})); }
                list.querySelectorAll('.ss-opt').forEach(o => o.classList.remove('ss-selected'));
                if (email) opt.classList.add('ss-selected');
                const display = emailWrap.querySelector('.ss-display');
                if (display) display.innerHTML = email ? SearchableSelect._esc(label) : '<span class="ss-placeholder">— Select User Email —</span>';
                const panel = emailWrap.querySelector('.ss-panel');
                if (panel) { panel.classList.remove('ss-open'); panel.style.display = 'none'; }
              });
              list.appendChild(opt);
            });
            // Clear current email selection since group changed
            const hidden = emailWrap.querySelector('input[type="hidden"]');
            if (hidden && hidden.value) { hidden.value = ""; hidden.dispatchEvent(new Event('change', {bubbles:true})); }
            const display = emailWrap.querySelector('.ss-display');
            if (display) display.innerHTML = '<span class="ss-placeholder">— Select User Email —</span>';
          }
        });
      }

      // Wire approver emails: max 6 enforcement + auto-populate approver last names
      const approverWrap = card.querySelector('[data-multi="1"]');
      if (approverWrap) {
        const self = this;
        approverWrap.addEventListener('ss-change', function() {
          const cbs = Array.from(approverWrap.querySelectorAll('.sa-approver-cb:checked'));
          // Enforce max 6
          if (cbs.length > 6) {
            cbs[cbs.length - 1].checked = false;
            SearchableSelect._updateMultiDisplay(approverWrap);
            alert("Maximum 6 approvers allowed.");
            approverWrap.dispatchEvent(new Event('ss-change', {bubbles:true}));
            return;
          }
          // Auto-populate approver last names
          const selected = cbs.map(cb => cb.value);
          const users = self._getUploadedUsers();
          const lastNames = selected.map(email => {
            const u = users.find(usr => usr.email === email);
            return u ? (u.lastName || "") : "";
          }).filter(Boolean);
          const lnField = card.querySelector('[data-auto-from="approverEmails"]');
          if (lnField) lnField.value = lastNames.join(",");
        });
      }

      this._renumberCards(secKey);
    },

    _renumberCards(secKey) {
      const container = document.getElementById("cards-" + secKey);
      if (!container) return;
      container.querySelectorAll('.sa-card-num').forEach((el, i) => { el.textContent = '#' + (i + 1); });
      const countEl = document.getElementById("count-" + secKey);
      if (countEl) countEl.textContent = container.children.length + ' row' + (container.children.length !== 1 ? 's' : '');

    _readTable(secKey) {
      const container = document.getElementById("cards-" + secKey);
      if (!container) return [];
      const rows = [];
      container.querySelectorAll(".sa-card").forEach(card => {
        const row = {};
        card.querySelectorAll("input, select").forEach(el => {
          if (el.dataset.col) row[el.dataset.col] = el.value;
        });
        // Read multi-select approver fields (checkbox-based)
        card.querySelectorAll('[data-multi="1"]').forEach(wrapper => {
          const col = wrapper.dataset.col;
          if (col) {
            const selected = [];
            wrapper.querySelectorAll('.sa-approver-cb:checked').forEach(cb => selected.push(cb.value));
            row[col] = selected.join(",");
          }
        });
        rows.push(row);
      });
      return rows;
    },

    _getUploadedUserEmails() {
      const usersData = StateStore.state.stepData && StateStore.state.stepData["cat-0"];
      if (!usersData || !usersData.uploader || !usersData.uploader.mappedData) return [];
      return usersData.uploader.mappedData.map(u => u.email).filter(e => e && e.trim());
    },

    _downloadUnspscTemplate(type) {
      const title = type === "Block" ? "UNSPSC Block" : "UNSPSC Restrict";
      const policyLabel = type === "Block" ? "Blocked Policy" : "Restricted Policy";
      const actionLabel = type === "Block" ? "Block this UNSPSC code:  mark column with an X." : "Restrict this UNSPSC code:  mark column with an X.";
      const wb = XLSX.utils.book_new();
      // Row 1: headers + policy type, Row 2: data values, Row 3: UNSPSC column headers, Row 4+: codes
      const data = [
        ["Group Path", "Type of Policy", "Message for Buyer", "Level 1 Approvers email(s) (separate by comma) Max of 6 approvers", "Level 2 Approvers email(s) (separate by comma) Max of 6 approvers", "Level 3 Approvers email(s) (separate by comma) Max of 6 approvers"],
        ["", policyLabel, "", "", "", ""],
        [actionLabel, "UNSPSC_Code", "UNSPSC_Title (English)", "UNSPSC_Title (Spanish)", "UNSPSC_Level"]
      ];
      // Pre-fill metadata from the form if available
      const metaGP = document.querySelector('#unspsc-meta input[data-col="groupPath"]');
      const metaBM = document.querySelector('#unspsc-meta [data-col="buyerMessage"]');
      const metaAE = document.querySelector('#unspsc-meta input[data-col="approverEmail"]');
      if (metaGP && metaGP.value) data[1][0] = metaGP.value;
      if (metaBM && metaBM.value) data[1][2] = metaBM.value;
      if (metaAE && metaAE.value) data[1][3] = metaAE.value;
      // Add all UNSPSC codes from embedded data
      UNSPSC_CODES.forEach(c => { data.push(["", c[0], c[1], c[2], c[3]]); });
      const ws = XLSX.utils.aoa_to_sheet(data);
      // Set column widths for nice formatting
      ws["!cols"] = [
        { wch: 30 },  // A: Group Path / Mark X
        { wch: 20 },  // B: Type of Policy / UNSPSC Code
        { wch: 55 },  // C: Message / Title EN
        { wch: 55 },  // D: L1 Approvers / Title ES
        { wch: 55 },  // E: L2 Approvers / Level
        { wch: 55 },  // F: L3 Approvers
      ];
      XLSX.utils.book_append_sheet(wb, ws, title);

      // Add Groups Reference sheet
      const md = StateStore.state.masterData || {};
      const root = md.rootGroupPath || "";
      if (root) {
        const groupPaths = [root];
        (md.groups || []).forEach(g => { if (g.fullPath) groupPaths.push(g.fullPath); });
        const groupsData = [["Group Path"]];
        groupPaths.forEach(p => groupsData.push([p]));
        const groupsWs = XLSX.utils.aoa_to_sheet(groupsData);
        groupsWs["!cols"] = [{ wch: 50 }];
        XLSX.utils.book_append_sheet(wb, groupsWs, "Groups Reference");
      }

      XLSX.writeFile(wb, type + "_Template.xlsx");
    },

    _parseUnspscUpload(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const wb = XLSX.read(data, { type: "array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
          const sheetName = wb.SheetNames[0] || "";
          const isBlock = sheetName.toLowerCase().includes("block") || (json[1] && String(json[1][1] || "").toLowerCase().includes("block"));
          const type = isBlock ? "Block" : "Restrict";
          // Read metadata from row 2 (0-indexed row 1): Group Path=A2, Message=C2, Approver=D2
          const groupPath = json[1] ? String(json[1][0] || "").trim() : "";
          const buyerMessage = json[1] ? String(json[1][2] || "").trim() : "";
          const approverEmail = json[1] ? String(json[1][3] || "").trim() : "";
          // Read X marks from column A, starting at row 4 (0-indexed row 3)
          const selectedCodes = [];
          for (let r = 3; r < json.length; r++) {
            const mark = String(json[r][0] || "").trim().toUpperCase();
            const code = String(json[r][1] || "").trim();
            const title = String(json[r][2] || "").trim();
            if (mark === "X" && code) {
              selectedCodes.push({ code, title });
            }
          }
          if (type === "Block") {
            this._unspscData.blockCodes = selectedCodes;
            this._unspscData.blockMeta = { groupPath, buyerMessage, approverEmail };
          } else {
            this._unspscData.restrictCodes = selectedCodes;
            this._unspscData.restrictMeta = { groupPath, buyerMessage, approverEmail };
          }
          // Update metadata fields from uploaded file
          const metaGP = document.querySelector('#unspsc-meta input[data-col="groupPath"]');
          const metaPT = document.querySelector('#unspsc-meta [data-col="policyType"]');
          const metaAE = document.querySelector('#unspsc-meta input[data-col="approverEmail"]');
          const metaBM = document.querySelector('#unspsc-meta [data-col="buyerMessage"]');
          if (metaGP && groupPath) metaGP.value = groupPath;
          if (metaPT) metaPT.value = type;
          if (metaAE && approverEmail) metaAE.value = approverEmail;
          if (metaBM && buyerMessage) metaBM.value = buyerMessage;
          // Show status
          const status = document.getElementById("unspsc-status");
          if (status) {
            status.style.display = "block";
            status.innerHTML = (this._unspscData.blockCodes.length ? '<div style="background:#FFEBEE;border:1px solid #FFCDD2;border-radius:6px;padding:10px;margin-bottom:8px;font-size:13px;">🚫 <strong>Block</strong> — ' + this._unspscData.blockCodes.length + ' code(s) selected</div>' : '') +
              (this._unspscData.restrictCodes.length ? '<div style="background:#FFF3E0;border:1px solid #FFE0B2;border-radius:6px;padding:10px;margin-bottom:8px;font-size:13px;">⚠️ <strong>Restrict</strong> — ' + this._unspscData.restrictCodes.length + ' code(s) selected</div>' : '');
          }
        } catch (ex) {
          alert("Unable to read the UNSPSC template. Please ensure it's a valid .xlsx file.");
        }
      };
      reader.readAsArrayBuffer(file);
    },

    validate() { return { valid: true, errors: [] }; },

    getData() {
      const result = {};
      if (this._sections) {
        Object.keys(this._sections).forEach(sk => {
          if (this._sections[sk].isTemplateUpload) {
            // Read metadata from the form fields
            const meta = {};
            document.querySelectorAll('#unspsc-meta [data-col]').forEach(el => { meta[el.dataset.col] = el.value; });
            result[sk] = {
              meta,
              blockCodes: this._unspscData ? this._unspscData.blockCodes : [],
              restrictCodes: this._unspscData ? this._unspscData.restrictCodes : [],
              blockMeta: this._unspscData ? this._unspscData.blockMeta : {},
              restrictMeta: this._unspscData ? this._unspscData.restrictMeta : {},
            };
          } else {
            result[sk] = this._readTable(sk);
          }
        });
      }
      return result;
    },

    setData(data) {
      if (!data || !this._sections) return;
      Object.keys(this._sections).forEach(sk => {
        if (this._sections[sk].isTemplateUpload) {
          if (data[sk]) {
            this._unspscData = {
              blockCodes: data[sk].blockCodes || [],
              restrictCodes: data[sk].restrictCodes || [],
              blockMeta: data[sk].blockMeta || {},
              restrictMeta: data[sk].restrictMeta || {},
            };
            // Restore metadata fields
            if (data[sk].meta) {
              setTimeout(() => {
                document.querySelectorAll('#unspsc-meta [data-col]').forEach(el => {
                  if (data[sk].meta[el.dataset.col]) el.value = data[sk].meta[el.dataset.col];
                });
                // Restore status display
                const status = document.getElementById("unspsc-status");
                if (status && (this._unspscData.blockCodes.length || this._unspscData.restrictCodes.length)) {
                  status.style.display = "block";
                  status.innerHTML = (this._unspscData.blockCodes.length ? '<div style="background:#FFEBEE;border:1px solid #FFCDD2;border-radius:6px;padding:10px;margin-bottom:8px;font-size:13px;">🚫 <strong>Block</strong> — ' + this._unspscData.blockCodes.length + ' code(s) loaded</div>' : '') +
                    (this._unspscData.restrictCodes.length ? '<div style="background:#FFF3E0;border:1px solid #FFE0B2;border-radius:6px;padding:10px;margin-bottom:8px;font-size:13px;">⚠️ <strong>Restrict</strong> — ' + this._unspscData.restrictCodes.length + ' code(s) loaded</div>' : '');
                }
              }, 50);
            }
          }
        } else {
          if (data[sk] && data[sk].length) {
            data[sk].forEach(row => this._addRow(sk, this._sections[sk].columns, row));
          }
        }
      });
    },
  };

        el.addEventListener("change", () => { const fg = el.closest(".form-group"); if (fg) fg.classList.remove("has-error"); });
      });
    },

    validate() {
      const errors = [];
      const required = [
        {id:"dr-orgName",label:"Organization Name"},
        {id:"dr-roomType",label:"Type of Digital Room"},
        {id:"dr-ingressPoint",label:"AB Ingress Point"},
        {id:"dr-aeName",label:"Account Executive Name"},
        {id:"dr-aeEmail",label:"Account Executive Email"},
        {id:"dr-adminName",label:"Customer Admin Name"},
        {id:"dr-adminEmail",label:"Customer Admin Email"},
      ];
      required.forEach(f => {
        const el = document.getElementById(f.id);
        if (el && !el.value.trim()) {
          const fg = el.closest(".form-group");
          if (fg) fg.classList.add("has-error");
          errors.push(f.label + " is required");
        }
      });
      if (errors.length > 0) {
        const firstErr = document.querySelector(".has-error");
        if (firstErr) firstErr.scrollIntoView({ behavior: "smooth", block: "center" });
      }
      return { valid: errors.length === 0, errors };
    },

    getData() {
      const get = (id) => { const el = document.getElementById(id); return el ? el.value : ""; };
      return {
        orgName: get("dr-orgName"),
        roomType: get("dr-roomType"),
        ingressPoint: get("dr-ingressPoint"),
        logoDataUrl: this._logoDataUrl || null,
        aeName: get("dr-aeName"),
        aeEmail: get("dr-aeEmail"),
        aePhone: get("dr-aePhone"),
        adminName: get("dr-adminName"),
        adminEmail: get("dr-adminEmail"),
        adminPhone: get("dr-adminPhone"),
        buyerMsg1: get("dr-buyerMsg1"),
        buyerMsg2: get("dr-buyerMsg2"),
        buyerMsg3: get("dr-buyerMsg3"),
        buyerMsg4: get("dr-buyerMsg4"),
        adminMsg1: get("dr-adminMsg1"),
        adminMsg2: get("dr-adminMsg2"),
        adminMsg3: get("dr-adminMsg3"),
        adminMsg4: get("dr-adminMsg4"),
      };
    },

    setData(data) {
      if (!data) return;
      const set = (id, val) => { const el = document.getElementById(id); if (el && val) el.value = val; };
      set("dr-orgName", data.orgName);
      set("dr-roomType", data.roomType);
      set("dr-ingressPoint", data.ingressPoint);
      set("dr-aeName", data.aeName);
      set("dr-aeEmail", data.aeEmail);
      set("dr-aePhone", data.aePhone);
      set("dr-adminName", data.adminName);
      set("dr-adminEmail", data.adminEmail);
      set("dr-adminPhone", data.adminPhone);
      set("dr-buyerMsg1", data.buyerMsg1);
      set("dr-buyerMsg2", data.buyerMsg2);
      set("dr-buyerMsg3", data.buyerMsg3);
      set("dr-buyerMsg4", data.buyerMsg4);
      set("dr-adminMsg1", data.adminMsg1);
      set("dr-adminMsg2", data.adminMsg2);
      set("dr-adminMsg3", data.adminMsg3);
      set("dr-adminMsg4", data.adminMsg4);
      if (data.logoDataUrl) {
        this._logoDataUrl = data.logoDataUrl;
        document.getElementById("dr-logoStatus").textContent = "✓ Logo loaded";
        document.getElementById("dr-logoStatus").style.color = "#067D62";
        document.getElementById("dr-logoPreview").innerHTML =
          '<img src="' + data.logoDataUrl + '" style="max-height:60px;max-width:200px;border:1px solid #DDD;border-radius:4px;padding:4px;">';
      }
    },
  };


  /* ==========================================================
     Category Step Registry
     ========================================================== */

  const categoryStepRegistry = {
    0: UsersGroupsStep,
    1: ShippingAddressesStep,
    2: OrderCheckoutStep,
    3: SpendingApprovalsStep,
    4: InvoicingStep,
    5: BlanketPOStep,
    6: PreferredProductsStep,
    7: CheckoutDefaultsStep,
    8: BusinessGivingStep,
    9: TaxExemptionStep,
    10: DigitalRoomStep,
  };


  /* ==========================================================
     TASK 12.1 — Validation System (inline error display)
     Already wired into each step's validate() + live clearing.
     This helper adds scroll-to-first-error behavior globally.
     ========================================================== */

  function showStepErrors(errors) {
    if (!errors || !errors.length) return;
    const firstErr = document.querySelector(".has-error");
    if (firstErr) firstErr.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  /* ==========================================================
     TASK 14.1 — Review & Generate Step
     ========================================================== */

  const ReviewStep = {
    id: "review", label: "Review & Generate", categoryId: -1,

    render(container) {
      const md = StateStore.state.masterData || {};
      const cats = StateStore.state.selectedCategories || [];
      const stepData = StateStore.state.stepData || {};

      let html = `<h2>📋 Review & Generate</h2>
        <p class="step-description">Review your configuration before generating the output file.</p>

        <div style="background:#F0F7FF;border:1px solid #D0E3F7;border-radius:6px;padding:16px;margin-bottom:20px;">
          <h3 style="margin-bottom:8px;font-size:16px;">Master Data</h3>
          <table style="font-size:14px;"><tbody>
            <tr><td style="padding:4px 16px 4px 0;font-weight:600;">Company Name:</td><td>${md.companyName || "—"}</td></tr>
            <tr><td style="padding:4px 16px 4px 0;font-weight:600;">Marketplace:</td><td>${md.marketplace || "—"}</td></tr>
            <tr><td style="padding:4px 16px 4px 0;font-weight:600;">Root Group Path:</td><td>${md.rootGroupPath || "—"}</td></tr>
            <tr><td style="padding:4px 16px 4px 0;font-weight:600;">Groups:</td><td>${(md.groups || []).map(g => g.fullPath).join(", ") || "None"}</td></tr>
          </tbody></table>
        </div>

        <h3 style="margin-bottom:12px;font-size:16px;">Feature Categories</h3>
        <table style="width:100%;border-collapse:collapse;font-size:14px;">
          <thead><tr>
            <th style="border:1px solid #DDD;padding:8px;background:#F5F5F5;text-align:left;">Category</th>
            <th style="border:1px solid #DDD;padding:8px;background:#F5F5F5;text-align:center;">Rows</th>
            <th style="border:1px solid #DDD;padding:8px;background:#F5F5F5;text-align:center;">Status</th>
            <th style="border:1px solid #DDD;padding:8px;background:#F5F5F5;text-align:center;">Action</th>
          </tr></thead><tbody>`;

      let allComplete = true;
      cats.sort((a, b) => a - b).forEach(catId => {
        const stepId = "cat-" + catId;
        const data = stepData[stepId] || {};
        const rowCount = this._getRowCount(catId, data);
        const isComplete = this._isComplete(catId, data);
        if (!isComplete) allComplete = false;
        const statusBadge = isComplete
          ? `<span style="background:#E8F5E9;color:#067D62;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;">Complete</span>`
          : `<span style="background:#FDE8E8;color:#D13212;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;">Incomplete</span>`;
        const navLink = !isComplete
          ? `<a href="#" onclick="event.preventDefault(); StepManager.goToStep(StepManager.steps.findIndex(s=>s.id==='${stepId}'))" style="color:#E47911;font-size:13px;">Go to step →</a>`
          : `<span style="color:#999;font-size:13px;">—</span>`;
        html += `<tr>
          <td style="border:1px solid #EEE;padding:8px;">${CAT_ICONS[catId]} ${CAT_NAMES[catId]}</td>
          <td style="border:1px solid #EEE;padding:8px;text-align:center;">${rowCount}</td>
          <td style="border:1px solid #EEE;padding:8px;text-align:center;">${statusBadge}</td>
          <td style="border:1px solid #EEE;padding:8px;text-align:center;">${navLink}</td>
        </tr>`;
      });
      html += `</tbody></table>`;

      html += `<div style="margin-top:24px;text-align:center;">
        <button class="btn btn-primary" id="btnGenerate" style="padding:14px 40px;font-size:16px;" ${allComplete ? "" : ""}>
          📥 Generate .xlsx File
        </button>
        ${!allComplete ? '<p style="color:#E47911;font-size:13px;margin-top:8px;">⚠ Some categories are incomplete. You can still generate, but the file may have missing data.</p>' : '<p style="color:#067D62;font-size:13px;margin-top:8px;">✓ All categories complete. Ready to generate!</p>'}
        <div style="margin-top:20px;padding-top:20px;border-top:1px solid #EEE;">
          <button class="btn btn-sm btn-secondary" id="btnComplete" style="padding:12px 32px;font-size:14px;" disabled>
            ✓ Complete &amp; Finish
          </button>
          <p style="font-size:12px;color:#999;margin-top:6px;">Generate your file first, then complete the wizard.</p>
        </div>
      </div>`;

      container.innerHTML = html;
      document.getElementById("btnGenerate").addEventListener("click", () => {
        if (!allComplete) {
          if (!confirm("Some categories are incomplete. Generate anyway?")) return;
        }
        ExcelGenerator.generate();
        // Enable the Complete & Finish button after generation
        const btnComplete = document.getElementById("btnComplete");
        if (btnComplete) {
          btnComplete.disabled = false;
          btnComplete.classList.remove("btn-secondary");
          btnComplete.classList.add("btn-primary");
          btnComplete.style.background = "#067D62";
        }
      });
      document.getElementById("btnComplete").addEventListener("click", () => {
        showCompletionPage();
      });
    },

    _getRowCount(catId, data) {
      if (catId === 0) return (data.uploader && data.uploader.mappedData) ? data.uploader.mappedData.length : 0;
      if (catId === 1) return (data.uploader && data.uploader.mappedData) ? data.uploader.mappedData.length : 0;
      if (catId === 2) return (data.boiRoot || []).length + (data.boiGroup || []).length;
      if (catId === 3) {
        const unspscObj = data.unspscRestrict || {};
        const unspscCount = (unspscObj.blockCodes || []).length + (unspscObj.restrictCodes || []).length;
        return (data.approvals || []).length + (data.customApprovals || []).length + (data.spendingLimits || []).length + unspscCount + (data.keywordRestrict || []).length;
      }
      if (catId === 4) return (data.invoiceRows || []).length;
      if (catId === 5) return (data.bpo || []).length + (data.bpoAllocation || []).length;
      if (catId === 6) return (data.highlightList || []).length + (data.highlightBrands || []).length;
      if (catId === 7) return (data.checkoutDefaults || []).length;
      if (catId === 8) return (data.givingGroup || []).length + (data.givingIndividual || []).length;
      if (catId === 9) return (data.taxExemptions || []).length;
      if (catId === 10) return data.orgName ? 1 : 0;
      return 0;
    },

    _isComplete(catId, data) {
      return this._getRowCount(catId, data) > 0;
    },

    validate() { return { valid: true, errors: [] }; },
    getData() { return {}; },
    setData() {},
  };


  /* ==========================================================
     TASK 15.1 — Excel Generation Pipeline
     ========================================================== */

  const ExcelGenerator = {
    // Edit 3: Required columns per tab name (0-based column indices)
    REQUIRED_COLUMNS: {
      "1a. Group Structure": [0, 1],                          // Group Name, Full Path
      "2.User Upload List (without AA)": [0, 1, 2],          // Email, First Name, Last Name
      "3. User Upload List (with AA)": [0, 1, 2],            // Email, First Name, Last Name
      "5. Addresses": [0, 2, 3, 4],                          // Address Line 1, City, State, ZIP
      "4a. BOI Root Level": [0, 2, 3, 4],                         // Label, Root or Group Path (auto), Enabled, Required
      "4b. BOI Group Level ": [0, 1, 3],                         // Group Path, BOI Field, Enabled
      "6a. Approvals": [0, 1, 2, 3, 4, 5, 6],              // Group Path, Type of Policy, Policy Name, Policy Application, Lower Threshold, Upper Threshold, Approver Emails
      "6a. Custom Approvals": [0, 1, 2, 3, 4, 5, 6, 7, 8], // Group Path, First Name, Last Name, Email, Type of Policy, Policy Name, Lower Threshold, Upper Threshold, Approver Emails
      "7. Invoice Template US": [0, 3, 5, 6, 7, 8],         // Group Path, Street, City, State, ZIP, Country
      "8. Invoice Template CA": [0, 3, 5, 6, 7, 8],         // Group Path, Street, City, State, ZIP, Country
      "9. BPO": [0, 1, 3, 4, 5],                            // Group Path, PO Name, Amount, Start, End
      "12. Highlight List": [0],                              // ASIN
      "13. Highlight Brands": [0],                            // Brand Name
      "14. Tax Exemption": [0, 1],                           // Certificate Name, Group Path
    },

    generate() {
      const state = StateStore.state;
      const md = state.masterData || {};
      const cats = state.selectedCategories || [];
      const stepData = state.stepData || {};
      const wb = XLSX.utils.book_new();
      const self = this;

      // Helper: add a worksheet with headers and data rows
      function addSheet(tabName, headers, rows) {
        const requiredCols = self.REQUIRED_COLUMNS[tabName] || [];
        const hasData = rows.length > 0;

        // Prefix required headers with "* " and add status + note row
        const styledHeaders = headers.map((h, i) => requiredCols.includes(i) ? "* " + h : h);
        const statusText = hasData ? "✅ CONFIGURED — " + rows.length + " row(s)" : "⬜ NO DATA";
        const noteRow = [statusText + "  |  Fields marked with * are required"];
        while (noteRow.length < headers.length) noteRow.push("");

        const wsData = [noteRow, styledHeaders, ...rows];
        const ws = XLSX.utils.aoa_to_sheet(wsData);

        // Tab color (Pro only, but set anyway for future compat)
        if (TAB_COLORS[tabName]) {
          ws["!tabColor"] = { rgb: TAB_COLORS[tabName] };
        }

        // Set column widths
        ws["!cols"] = headers.map((h, i) => {
          const baseLen = h.length;
          if (h.toLowerCase().includes("path") || h.toLowerCase().includes("email") || h.toLowerCase().includes("address")) {
            return { wch: Math.max(baseLen + 4, 30) };
          }
          return { wch: Math.max(baseLen + 4, 16) };
        });

        // Rename tab to include status indicator for quick visual scanning
        const displayName = hasData ? "✓ " + tabName : tabName;
        // Tab names have a 31-char limit in Excel
        const safeName = displayName.length > 31 ? displayName.substring(0, 31) : displayName;

        XLSX.utils.book_append_sheet(wb, ws, safeName);
      }

      const mp = md.marketplace || "US";

      cats.sort((a, b) => a - b).forEach(catId => {
        const data = stepData["cat-" + catId] || {};
        const tabs = CATEGORY_TAB_MAP[catId] || [];

        if (catId === 0) {
          // ---- Category 0: Users & Groups ----
          const groups = md.groups || [];
          const root = md.rootGroupPath || "";
          const groupAssignments = (data.groupAssigner && data.groupAssigner.assignments) || {};
          const users = (data.uploader && data.uploader.mappedData) || [];

          // 1a. Group Structure
          addSheet("1a. Group Structure", ["Group Name", "Full Path", "Parent Group"],
            groups.map(g => [g.name, g.fullPath, g.parentPath || root])
          );

          // 2. User Upload List (without AA)
          // Expand users into multiple rows based on multi-group+role assignments
          const userRows = [];
          users.forEach((u, i) => {
            const assign = groupAssignments[i];
            if (Array.isArray(assign) && assign.length > 0) {
              // Multi-group+role: one row per group+role pair
              assign.forEach(pair => {
                userRows.push([
                  u.email || "", u.firstName || "", u.lastName || "",
                  pair.role || "Requisitioner",
                  pair.group || root
                ]);
              });
            } else if (typeof assign === "string" && assign) {
              // Legacy single-group assignment
              userRows.push([
                u.email || "", u.firstName || "", u.lastName || "",
                u.role || "Requisitioner",
                assign
              ]);
            } else {
              // No assignment — use root
              userRows.push([
                u.email || "", u.firstName || "", u.lastName || "",
                u.role || "Requisitioner",
                root
              ]);
            }
          });

          const aa = !!data.accountAuthority;

          if (aa) {
            addSheet("3. User Upload List (with AA)",
              ["Email Address", "First Name", "Last Name", "Role", "Group Path"],
              userRows
            );
          } else {
            addSheet("2.User Upload List (without AA)",
              ["Email Address", "First Name", "Last Name", "Role", "Group Path"],
              userRows
            );
          }
        }

        else if (catId === 1) {
          // ---- Category 1: Shipping Addresses ----
          const addresses = (data.uploader && data.uploader.mappedData) || [];
          const groupAssignments = (data.groupAssigner && data.groupAssigner.assignments) || {};
          const schedules = data.deliverySchedules || {};
          const root = md.rootGroupPath || "";

          function formatSchedule(sched) {
            if (!sched) return "";
            const days = ["mon","tue","wed","thu","fri"];
            return days.map(d => {
              const s = sched[d] || ["09:00","17:00"];
              return d.charAt(0).toUpperCase() + d.slice(1) + ": " + s[0] + "-" + s[1];
            }).join("; ");
          }

          // Build address rows — duplicate each address for each assigned group
          const addrRows = [];
          addresses.forEach((a, i) => {
            const groups = groupAssignments[i];
            const schedule = formatSchedule(schedules[i]);
            const baseRow = [
              a.addressLine1 || "", a.addressLine2 || "", a.city || "",
              a.state || "", a.zip || "", a.country || mp,
              a.phone || "", a.label || ""
            ];
            if (Array.isArray(groups) && groups.length > 0) {
              groups.forEach(g => { addrRows.push([...baseRow, g, schedule]); });
            } else {
              addrRows.push([...baseRow, (typeof groups === "string" ? groups : "") || root, schedule]);
            }
          });

          addSheet("5. Addresses",
            ["Address Line 1","Address Line 2","City","State","ZIP","Country/Region","Phone Number","Address Label","Group Path","Delivery Hours"],
            addrRows
          );
        }

        else if (catId === 2) {
          // ---- Category 2: Order Checkout Fields (BOI) ----
          const boiRoot = data.boiRoot || [];
          const boiGroup = data.boiGroup || [];

          // 4a. BOI Root Level — matches original template: Label, Name for Custom Field, Root or Group Path, Enabled, Required, Free form or preset, Buyer Options
          addSheet("4a. BOI Root Level",
            ["Label (minimum 500 per label)","Name for Custom Field","Root or Group Path","Enabled? (Y/N)","Required? (Y/N)","Free form or preset list of options?","Buyer Options - preset list option only (separate by semi-colon)"],
            boiRoot.map(r => [
              r.label || "", r.customFieldName || "N/A",
              md.rootGroupPath || "",
              r.enabled || "Yes", r.required || "No",
              r.fieldType || "Free Form", r.buyerOptions || "N/A"
            ])
          );

          // 4b. BOI Group Level — separate tab matching the BOI Group Level template format
          // Columns match the reference template: Group Path, BOI Field, Label, Enabled, Required, Display Type, Default Option, Display Priority, Operation
          addSheet("4b. BOI Group Level ",
            ["Group Path","BOI Field","Label (max 30 chars)","Enabled","Required","Display Type","Buyer Options (semi-colon separated)","Default Option","Display Priority","Operation"],
            boiGroup.map(r => [
              r.groupPath || "", r.fieldName || "", r.fieldLabel || "",
              r.enabled || "Yes", r.required || "No",
              r.fieldType || "FREEFORM", r.buyerOptions || "N/A", r.defaultOption || "", r.displayPriority || "",
              r.operation || "ADD"
            ])
          );
        }

        else if (catId === 3) {
          // ---- Category 3: Spending Approvals ----
          const approvals = data.approvals || [];
          const customApprovals = data.customApprovals || [];
          const spendingLimits = data.spendingLimits || [];
          const unspsc = data.unspscRestrict || {};
          const keywords = data.keywordRestrict || [];

          addSheet("6a. Approvals",
            ["Group Path","Type of Policy","Policy Name","Policy Application","Lower Threshold","Upper Threshold","Level 1 Approvers email(s) (separate by comma) Max of 6 approvers","Last Name from Approver"],
            approvals.map(r => [r.groupPath || "", r.policyType || "Spending Limit", r.policyName || "", r.policyApp || "GROUP_ONLY", r.lowerThreshold || "", r.upperThreshold || "", r.approverEmails || "", r.approverLastName || ""])
          );

          addSheet("6a. Custom Approvals",
            ["Group Path","User First Name","User Last Name","User Email","Type of Policy","Name of GB Policy","Lower Threshold","Upper Threshold","Level 1 Approvers email(s) (separate by comma) Max of 6 approvers","Last Name from Approver"],
            customApprovals.map(r => [r.groupPath || "", r.firstName || "", r.lastName || "", r.userEmail || "", r.policyType || "Spending Limit", r.policyName || "", r.lowerThreshold || "", r.upperThreshold || "", r.approverEmails || "", r.approverLastName || ""])
          );

          addSheet("6b. Spending Limits Category",
            ["Group Path","Type of Policy","Policy Name","Policy Application","Lower Threshold","Upper Threshold","Level 1 Approvers email(s) (separate by comma) Max of 6 approvers"],
            spendingLimits.map(r => [r.groupPath || "", r.policyType || "Spending Limit", r.policyName || "", r.policyApp || "GROUP_ONLY", r.lowerThreshold || "", r.upperThreshold || "", r.approverEmails || ""])
          );

          // Generate separate Block sheet if codes exist
          const unspscObj = data.unspscRestrict || {};
          const blockCodes = unspscObj.blockCodes || [];
          const restrictCodes = unspscObj.restrictCodes || [];
          const blockMeta = unspscObj.blockMeta || unspscObj.meta || {};
          const restrictMeta = unspscObj.restrictMeta || unspscObj.meta || {};

          if (blockCodes.length > 0) {
            const blockData = [
              ["Group Path", "Type of Policy", "Message for Buyer", "Level 1 Approvers email(s) (separate by comma) Max of 6 approvers", "Level 2 Approvers email(s) (separate by comma) Max of 6 approvers", "Level 3 Approvers email(s) (separate by comma) Max of 6 approvers"],
              [blockMeta.groupPath || "", "Blocked Policy", blockMeta.buyerMessage || "", blockMeta.approverEmail || ""],
              ["Block this UNSPSC code:  mark column with an X.", "UNSPSC_Code", "UNSPSC_Title (English)"]
            ];
            blockCodes.forEach(c => { blockData.push(["X", c.code, c.title]); });
            const blockWs = XLSX.utils.aoa_to_sheet(blockData);
            blockWs["!cols"] = [{wch:30},{wch:20},{wch:55},{wch:55},{wch:55},{wch:55}];
            XLSX.utils.book_append_sheet(wb, blockWs, "UNSPSC Block");
          }

          if (restrictCodes.length > 0) {
            const restrictData = [
              ["Group Path", "Type of Policy", "Message for Buyer", "Level 1 Approvers email(s) (separate by comma) Max of 6 approvers", "Level 2 Approvers email(s) (separate by comma) Max of 6 approvers", "Level 3 Approvers email(s) (separate by comma) Max of 6 approvers"],
              [restrictMeta.groupPath || "", "Restricted Policy", restrictMeta.buyerMessage || "", restrictMeta.approverEmail || ""],
              ["Restrict this UNSPSC code:  mark column with an X.", "UNSPSC_Code", "UNSPSC_Title (English)"]
            ];
            restrictCodes.forEach(c => { restrictData.push(["X", c.code, c.title]); });
            const restrictWs = XLSX.utils.aoa_to_sheet(restrictData);
            restrictWs["!cols"] = [{wch:30},{wch:20},{wch:55},{wch:55},{wch:55},{wch:55}];
            XLSX.utils.book_append_sheet(wb, restrictWs, "UNSPSC Restrict");
          }

          addSheet("15. Restrict products by keywor",
            ["Group Path","Policy Name","Policy Application","Keyword","Level 1 Approvers email(s)"],
            keywords.map(r => [r.groupPath || "", r.policyName || "", r.policyApp || "", r.keyword || "", r.approverEmails || ""])
          );
        }

        else if (catId === 4) {
          // ---- Category 4: Invoicing (group-level) ----
          const invoiceRows = data.invoiceRows || [];
          const tabName = mp === "US" ? "7. Invoice Template US" : "8. Invoice Template CA";
          const headers = ["Group Path","Business Name","Invoice Template Name","Street Address","Address Line 2","City","State/Province","ZIP/Postal Code","Country","Invoice Email","Payment Terms"];
          addSheet(tabName, headers,
            invoiceRows.map(r => [
              r.groupPath || "", r.companyName || md.companyName || "", r.templateName || "",
              r.address || "", r.address2 || "", r.city || "", r.state || "",
              r.zip || "", r.country || mp, r.email || "", r.paymentTerms || ""
            ])
          );
        }

        else if (catId === 5) {
          // ---- Category 5: Blanket Purchase Orders ----
          const bpo = data.bpo || [];

  const ProgressIO = {
    exportProgress() {
      // Save current step data first
      const current = StepManager.getCurrentStep();
      if (current && current.getData) {
        StateStore.state.stepData[current.id] = current.getData();
      }
      const json = JSON.stringify(StateStore.state, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const name = (StateStore.state.masterData.companyName || "wizard").replace(/[^a-zA-Z0-9_\- ]/g, "");
      a.download = name + "_progress.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    },

    importProgress() {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".json";
      input.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = JSON.parse(ev.target.result);
            if (!parsed.version || typeof parsed.version !== "number") {
              alert("Error: Incompatible or invalid progress file. The current session has not been changed.");
              return;
            }
            StateStore.state = parsed;
            StateStore.saveState();
            // Rebuild steps
            const cats = parsed.selectedCategories || [];
            if (cats.length > 0) {
              StepManager.buildSteps(cats);
              const targetId = parsed.lastStep || "welcome";
              const idx = StepManager.steps.findIndex(s => s.id === targetId);
              if (idx >= 0) StepManager.currentIndex = idx;
            } else {
              StepManager.steps = [WelcomeStep, ReviewStep];
              StepManager.currentIndex = 0;
            }
            StepManager.renderCurrentStep();
            StepManager.updateProgressBar();
            StepManager.updateButtons();
            alert("Progress imported successfully!");
          } catch (ex) {
            alert("Error: Malformed JSON file. The current session has not been changed.");
          }
        };
        reader.readAsText(file);
      });
      input.click();
    }
  };

  /* ==========================================================

  const SessionManager = {
    sessionId: null,

    init() {
      // Check URL for ?session=xxx parameter
      const params = new URLSearchParams(window.location.search);
      this.sessionId = params.get("session") || null;
    },

    getStorageKey() {
      return this.sessionId
        ? "configWizard_" + this.sessionId
        : "configWizardState";
    },

    hasSession() {
      return !!this.sessionId;
    },

    getSessionLabel() {
      if (!this.sessionId) return "";
      // Convert session-id to display name: "acme-corp-2025" → "Acme Corp 2025"
      return this.sessionId.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }
  };


  // ── Patch StateStore to use session-based keys ──

  StateStore.saveState = function() {
    try {
      localStorage.setItem(SessionManager.getStorageKey(), JSON.stringify(this.state));
    } catch (e) {
      if (e.name === "QuotaExceededError" || e.code === 22) {
        console.warn("StateStore: localStorage quota exceeded.");
      } else {
        console.warn("StateStore: Unable to save.", e);
      }
    }
  };

  StateStore.loadState = function() {
    try {
      const raw = localStorage.getItem(SessionManager.getStorageKey());
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) {
      console.warn("StateStore: Unable to read.", e);
      return null;
    }
  };

  StateStore.clearState = function() {
    try {
      localStorage.removeItem(SessionManager.getStorageKey());
    } catch (e) {
      console.warn("StateStore: Unable to clear.", e);
    }
    this.state = this.createFreshState();
  };

  function createNewSession() {
    const name = document.getElementById("inp-sessionName").value.trim();
    if (!name) {
      document.getElementById("inp-sessionName").style.borderColor = "#D13212";
      return;
    }
    // Generate session code: lowercase, replace spaces with dashes, add random suffix
    const base = name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    const suffix = Math.random().toString(36).substring(2, 6);
    const sessionCode = base + "-" + suffix;

    // Build the link
    const currentUrl = window.location.href.split("?")[0];
    const link = currentUrl + "?session=" + sessionCode;

    document.getElementById("inp-sessionLink").value = link;
    document.getElementById("generatedLink").style.display = "block";
    document.getElementById("btnCreateSession").style.display = "none";
    document.getElementById("btnStartSession").style.display = "inline-flex";
    document.getElementById("btnStartSession").dataset.session = sessionCode;
  }

  function startSession() {
    const code = document.getElementById("btnStartSession").dataset.session;
    if (!code) return;

    // Try navigating to the session URL
    const baseUrl = window.location.href.split("?")[0].split("#")[0];
    const targetUrl = baseUrl + "?session=" + code;

    // If navigation doesn't work (e.g. file:// quirks), initialize in-place
    try {
      // Set session directly and re-initialize without page reload as fallback
      SessionManager.sessionId = code;

      if (existingBanner) existingBanner.remove();
      const banner = document.createElement("div");

        <span style="color:#999;font-size:12px;">ID: ${code}</span>

      // Restore nav buttons
      document.getElementById("btnBack").style.display = "";
      document.getElementById("btnNext").style.display = "";

      StepManager.renderCurrentStep();

      // Also try updating the URL bar without reload

      return;
    }

    // Show session banner
    const banner = document.createElement("div");
    banner.style.cssText = "background:#E8F5E9;border-bottom:1px solid #C8E6C9;padding:8px 24px;font-size:13px;color:#2E7D32;display:flex;align-items:center;justify-content:space-between;";
    banner.innerHTML = `
      <span>🔗 Session: <strong>${SessionManager.getSessionLabel()}</strong> — Your progress auto-saves to this browser.</span>
      <span style="color:#999;font-size:12px;">ID: ${SessionManager.sessionId}</span>
    `;
    document.querySelector(".wizard-header").after(banner);

    if (!StateStore.isLocalStorageAvailable()) {
      console.warn("localStorage is unavailable. Auto-save is disabled.");
    }

    const saved = StateStore.loadState();
    if (saved && saved.version) {
      document.getElementById("resumeModal").classList.remove("hidden");
    } else {
      StepManager.steps = [WelcomeStep, ReviewStep];
      StepManager.currentIndex = 0;
      StepManager.renderCurrentStep();
      StepManager.updateProgressBar();
      StepManager.updateButtons();
    }

    document.addEventListener("input", (e) => {
      if (e.target && e.target.id === "inp-rootGroupPath") {
        WelcomeStep._updateAllPaths();
      }
    });
  })();
  </script>

</body>
