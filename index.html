<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Business | Configuration Wizard</title>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    /* ========================================================
       CSS — Amazon Business Configuration Wizard
       Responsive: 768px – 1920px
       Color palette: Navy #232F3E, Orange #E47911, White #FFF
       Min touch target: 44×44px, Min body text: 14px
       ======================================================== */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #232F3E;
      background: #F5F5F5;
      min-width: 768px;
    }

    /* — Header — */
    .wizard-header {
      background: #232F3E;
      color: #FFFFFF;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .wizard-header .brand {
      font-size: 18px;
      font-weight: 700;
      color: #E47911;
    }
    .wizard-header .brand span {
      color: #FFFFFF;
      font-weight: 400;
    }

    /* — Progress Indicator — */
    .progress-bar {
      background: #FFFFFF;
      border-bottom: 1px solid #DDD;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
    }
    .progress-step {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
      cursor: default;
      min-height: 44px;
      min-width: 44px;
      justify-content: center;
      user-select: none;
    }
    .progress-step.completed {
      color: #067D62;
      cursor: pointer;
    }
    .progress-step.completed:hover { background: #E8F5E9; }
    .progress-step.current {
      color: #E47911;
      font-weight: 600;
      cursor: pointer;
    }
    .progress-step.current:hover { background: #FFF3E0; }
    .progress-step.future {
      color: #999;
    }
    .progress-connector {
      width: 24px;
      height: 2px;
      background: #DDD;
      flex-shrink: 0;
    }
    .progress-connector.completed-line { background: #067D62; }

    /* — Content Area — */
    .wizard-content {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 24px;
    }
    .step-card {
      background: #FFFFFF;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 32px;
    }
    .step-card h2 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #232F3E;
    }
    .step-card .step-description {
      color: #555;
      margin-bottom: 24px;
      font-size: 14px;
    }

    /* — Learn More Tips — */
    .learn-tip {
      background: #F0F7FF; border: 1px solid #D0E3F7; border-radius: 6px;
      margin-bottom: 20px; font-size: 13px; overflow: hidden;
    }
    .learn-tip summary {
      padding: 10px 14px; cursor: pointer; font-weight: 600; color: #232F3E;
      list-style: none; display: flex; align-items: center; gap: 6px;
    }
    .learn-tip summary::-webkit-details-marker { display: none; }
    .learn-tip summary::before { content: "▸"; transition: transform 0.2s; display: inline-block; }
    .learn-tip[open] summary::before { transform: rotate(90deg); }
    .learn-tip .tip-body {
      padding: 0 14px 12px 14px; color: #444; line-height: 1.6;
    }
    .learn-tip .tip-body a {
      color: #E47911; text-decoration: none; font-weight: 600;
    }
    .learn-tip .tip-body a:hover { text-decoration: underline; }

    /* — Form Elements — */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 14px;
    }
    .form-group label .required {
      color: #D13212;
      margin-left: 2px;
    }
    .form-group input[type="text"],
    .form-group input[type="email"],
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #CCC;
      border-radius: 4px;
      font-size: 14px;
      min-height: 44px;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #E47911;
      box-shadow: 0 0 0 2px rgba(228,121,17,0.15);
    }
    .form-group .error-msg {
      color: #D13212;
      font-size: 13px;
      margin-top: 4px;
      display: none;
    }
    .form-group.has-error input,
    .form-group.has-error select {
      border-color: #D13212;
    }
    .form-group.has-error .error-msg {
      display: block;
    }

    /* — Buttons — */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      min-width: 44px;
      padding: 10px 24px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-primary {
      background: #E47911;
      color: #FFFFFF;
    }
    .btn-primary:hover { background: #C76A0E; }
    .btn-primary:disabled { background: #E4791180; cursor: not-allowed; }
    .btn-secondary {
      background: #E0E0E0;
      color: #232F3E;
    }
    .btn-secondary:hover { background: #D0D0D0; }
    .btn-secondary:disabled { background: #F0F0F0; color: #AAA; cursor: not-allowed; }
    .btn-sm {
      min-height: 36px;
      padding: 6px 16px;
      font-size: 13px;
    }
    .btn-danger {
      background: #D13212;
      color: #FFFFFF;
    }
    .btn-danger:hover { background: #B02A0F; }

    /* — Footer Navigation — */
    .wizard-footer {
      max-width: 960px;
      margin: 0 auto 32px;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* — Group Structure — */
    .group-rows { margin-top: 8px; }
    .group-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .group-row input { flex: 1; }
    .group-row .full-path {
      flex: 1.5;
      color: #555;
      font-size: 13px;
      padding: 10px 12px;
      background: #F9F9F9;
      border: 1px solid #EEE;
      border-radius: 4px;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .group-row .btn-remove {
      background: none;
      border: none;
      color: #D13212;
      cursor: pointer;
      font-size: 18px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    /* — Subgroups — */
    .subgroup-container { margin-left: 32px; border-left: 2px solid #E47911; padding-left: 12px; margin-bottom: 4px; }
    .subgroup-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .subgroup-row input { flex: 1; }
    .subgroup-row .full-path {
      flex: 1.5; color: #555; font-size: 12px; padding: 8px 10px; background: #FAFAFA;
      border: 1px solid #EEE; border-radius: 4px; min-height: 38px; display: flex; align-items: center;
    }
    .subgroup-row .btn-remove {
      background: none; border: none; color: #D13212; cursor: pointer; font-size: 16px;
      min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 4px;
    }
    .group-row .btn-remove:hover { background: #FDE8E8; }

    /* — Category Selector — */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-top: 8px;
    }
    .category-card {
      border: 2px solid #E0E0E0;
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-height: 44px;
    }
    .category-card:hover { border-color: #E47911; background: #FFF9F0; }
    .category-card.selected { border-color: #E47911; background: #FFF3E0; }
    .category-card input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: #E47911;
      flex-shrink: 0;
    }
    .category-card .cat-icon { font-size: 22px; flex-shrink: 0; }
    .category-card .cat-info { flex: 1; }
    .category-card .cat-name { font-weight: 600; font-size: 14px; }
    .category-card .cat-desc { font-size: 12px; color: #666; margin-top: 2px; }

    /* — Modal — */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #FFFFFF;
      border-radius: 8px;
      padding: 32px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      text-align: center;
    }
    .modal-box h3 { font-size: 18px; margin-bottom: 12px; }
    .modal-box p { color: #555; margin-bottom: 24px; font-size: 14px; }
    .modal-box .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* — Multi-Group Assignment Panel — */
    .mga-panel {
      background: #F9F9F9;
      border: 1px solid #E0E0E0;
      border-radius: 6px;
      padding: 12px;
      margin-top: 6px;
    }
    .mga-panel .mga-add-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .mga-panel .mga-add-row select {
      padding: 6px 8px;
      border: 1px solid #CCC;
      border-radius: 4px;
      font-size: 13px;
      min-height: 32px;
    }
    .mga-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #E8F5E9;
      border: 1px solid #C8E6C9;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      margin: 2px 4px 2px 0;
    }
    .mga-tag .mga-remove {
      background: none;
      border: none;
      color: #D13212;
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      line-height: 1;
    }
    .mga-tag .mga-remove:hover { color: #B02A0F; }

    /* — Spending Approvals Card Layout — */
    .sa-cards-container { display: flex; flex-direction: column; gap: 10px; }
    .sa-card {
      border: 1px solid #E0E0E0; border-radius: 6px; background: #FAFAFA;
      transition: box-shadow 0.15s;
    }
    .sa-card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .sa-card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 12px; background: #F0F0F0; border-bottom: 1px solid #E0E0E0;
    }
    .sa-card-num { font-weight: 600; font-size: 12px; color: #666; }
    .sa-card-remove {
      background: none; border: none; color: #D13212; cursor: pointer;
      font-size: 15px; min-width: 28px; min-height: 28px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .sa-card-remove:hover { background: #FDE8E8; }
    .sa-card-fields {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px 12px;
      padding: 10px 12px;
    }
    .sa-field { min-width: 0; }
    .sa-field-wide { grid-column: span 2; }
    .sa-field-label {
      display: block; font-size: 11px; font-weight: 600; color: #555;
      margin-bottom: 3px; line-height: 1.3;
    }
    .sa-section {
      border: 1px solid #E0E0E0; border-radius: 6px; margin-bottom: 12px;
      background: #FFF; overflow: hidden;
    }
    .sa-section[open] { border-color: #CCC; }
    .sa-section-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; cursor: pointer; font-size: 15px; font-weight: 600;
      color: #232F3E; background: #F9F9F9; user-select: none;
      list-style: none; border-bottom: 1px solid transparent;
    }
    .sa-section[open] .sa-section-toggle { border-bottom-color: #E0E0E0; }
    .sa-section-toggle::-webkit-details-marker { display: none; }
    .sa-section-toggle::before {
      content: "▸"; margin-right: 8px; transition: transform 0.15s; font-size: 12px;
    }
    .sa-section[open] .sa-section-toggle::before { transform: rotate(90deg); }
    .sa-section-title { flex: 1; }
    .sa-section-count {
      font-size: 11px; font-weight: 500; color: #888;
      background: #F0F0F0; padding: 2px 8px; border-radius: 10px;
    }
    .sa-section-body { padding: 12px 14px; }

    /* — Searchable Dropdown — */
    .ss-wrap { position: relative; }
    .ss-display {
      width: 100%; padding: 4px 28px 4px 8px; border: 1px solid #CCC; border-radius: 3px;
      font-size: 13px; min-height: 32px; cursor: pointer; background: #FFF;
      display: flex; align-items: center; overflow: hidden; white-space: nowrap;
      text-overflow: ellipsis;
    }
    .ss-display:hover { border-color: #999; }
    .ss-display::after {
      content: "▾"; position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      font-size: 10px; color: #888; pointer-events: none;
    }
    .ss-placeholder { color: #999; }
    .ss-panel {
      display: none; position: fixed; z-index: 1000;
      background: #FFF; border: 1px solid #CCC; border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18); overflow: hidden;
      min-width: 200px;
    }
    .ss-panel.ss-open { display: block; }
    .ss-search {
      width: 100%; padding: 6px 8px; border: none; border-bottom: 1px solid #EEE;
      font-size: 12px; outline: none; box-sizing: border-box;
    }
    .ss-list { max-height: 160px; overflow-y: auto; }
    .ss-opt {
      display: flex; align-items: center; gap: 6px; padding: 5px 8px; cursor: pointer;
      font-size: 12px; border-bottom: 1px solid #F8F8F8;
    }
    .ss-opt:hover { background: #FFF3E0; }
    .ss-opt.ss-selected { background: #E8F5E9; }
    .ss-opt.ss-hidden { display: none; }
    .ss-opt input[type="checkbox"] { accent-color: #E47911; flex-shrink: 0; }
    .ss-tag {
      display: inline-flex; align-items: center; background: #E8F5E9;
      padding: 1px 6px; border-radius: 3px; font-size: 11px; margin: 1px 2px;
    }
    .ss-empty { padding: 8px; font-size: 12px; color: #999; text-align: center; }

    /* — Responsive — */
    @media (max-width: 960px) {
      .wizard-content, .wizard-footer { padding: 0 16px; }
      .step-card { padding: 24px; }
      .category-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ============ Wizard Shell ============ -->
  <header class="wizard-header">
    <div class="brand">Amazon Business <span>| Configuration Wizard</span></div>
  </header>

  <nav class="progress-bar" id="progressBar"></nav>

  <main class="wizard-content">
    <div class="step-card" id="stepContent">
      <!-- Current step renders here -->
    </div>
  </main>

  <footer class="wizard-footer">
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-secondary" id="btnBack" onclick="StepManager.goBack()">← Back</button>
      <button class="btn btn-sm btn-secondary" onclick="ProgressIO.exportProgress()" title="Export Progress" style="font-size:12px;">💾 Export</button>
      <button class="btn btn-sm btn-secondary" onclick="ProgressIO.importProgress()" title="Import Progress" style="font-size:12px;">📂 Import</button>
    </div>
    <button class="btn btn-primary" id="btnNext" onclick="StepManager.goNext()">Next →</button>
  </footer>

  <!-- Resume Modal -->
  <div class="modal-overlay hidden" id="resumeModal">
    <div class="modal-box">
      <h3>Resume Previous Session?</h3>
      <p>We found a saved session. Would you like to pick up where you left off, or start fresh?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="handleResumeChoice(false)">Start New</button>
        <button class="btn btn-primary" onclick="handleResumeChoice(true)">Resume</button>
      </div>
    </div>
  </div>

  <script>
  /* ==========================================================
     TASK 3.1 — V4 Template Constants
     ========================================================== */

  const QUICK_REF = {

    2: "Add custom fields (PO numbers, cost centers, GL codes) that buyers fill in at checkout",

  const TAB_COLORS = {

    "2.User Upload List (without AA)": "E47911",
    "3. User Upload List (with AA)": "E47911",
    "4a. BOI Root Level": "4472C4",
    "4b. BOI Group Level ": "4472C4",
    "5. Addresses": "70AD47",
    "6a. Approvals": "FFC000",
    "6a. Custom Approvals": "FFC000",
    "6b. Spending Limits Category": "FFC000",
    "7. Invoice Template US": "ED7D31",
    "8. Invoice Template CA": "ED7D31",
    "9. BPO": "5B9BD5",

    "12. Highlight List": "A9D18E",
    "13. Highlight Brands": "A9D18E",

    "16. Checkout Default": "9DC3E6",

  };

  // UNSPSC codes: [code, title_en, title_es, level]
  // Extracted from the official UNSPSC Block/Restrict templates
  const UNSPSC_CODES = [
["10000000","Live Plant and Animal Material and Accessories and Supplies","Material Vivo Vegetal y Animal, Accesorios y Productos","L1"],
["10110000","Domestic pet products","Productos para mascotas","L2"],

["10160000","Floriculture and silviculture products","Productos de floricultura y silvicultura","L2"],

["10190000","Pest control products","Productos para el control de plagas","L2"],
["10191700","Pest control devices","Dispositivos de control de plagas","L3"],
["10191703","Flying insect control traps","Trampas para el control de insectos voladores","L4"],
["11000000","Mineral and Textile and Inedible Plant and Animal Materials","Material Mineral, Textil y Vegetal y Animal No Comestible","L1"],
["11150000","Fibers and threads and yarns","Fibra, hilos e hilados","L2"],
["11151600","Threads","Hilos","L3"],
["11160000","Fabrics and leather materials","Tejidos y materiales de cuero","L2"],

  /* ==========================================================
     Template Download/Upload Helper
     ========================================================== */

  const TemplateHelper = {
    /** Generate and download an XLSX template with the given headers and optional example row */
    downloadTemplate(filename, headers, exampleRow) {
      const wb = XLSX.utils.book_new();
      const data = [headers];
      if (exampleRow) data.push(exampleRow);
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws["!cols"] = headers.map(h => ({ wch: Math.max(h.length + 4, 20) }));
      XLSX.utils.book_append_sheet(wb, ws, "Template");

      // Add Groups Reference sheet if groups are defined
      const md = StateStore.state.masterData || {};
      const root = md.rootGroupPath || "";
      if (root) {
        const groupPaths = [root];
        (md.groups || []).forEach(g => { if (g.fullPath) groupPaths.push(g.fullPath); });
        const groupsData = [["Group Path"]];
        groupPaths.forEach(p => groupsData.push([p]));
        const groupsWs = XLSX.utils.aoa_to_sheet(groupsData);
        groupsWs["!cols"] = [{ wch: 50 }];
        XLSX.utils.book_append_sheet(wb, groupsWs, "Groups Reference");
      }

      XLSX.writeFile(wb, filename);
    },

    /** Parse an uploaded XLSX/CSV file and return rows as array of objects keyed by header */
    parseUpload(file, expectedHeaders, callback) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const data = new Uint8Array(ev.target.result);
          const wb = XLSX.read(data, { type: "array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
          if (json.length < 2) { alert("Template appears empty. Please add data rows below the header."); return; }

          // Map uploaded headers to expected headers (fuzzy match)
          const uploadHeaders = json[0].map(h => String(h).trim().toLowerCase());
          const mapping = {};
          expectedHeaders.forEach((eh, ei) => {
            const ehLower = eh.toLowerCase();
            // Exact match first
            let idx = uploadHeaders.indexOf(ehLower);
            if (idx === -1) {
              // Partial match
              idx = uploadHeaders.findIndex(uh => uh.includes(ehLower) || ehLower.includes(uh));
            }
            if (idx >= 0) mapping[ei] = idx;
          });

          const rows = [];
          for (let r = 1; r < json.length; r++) {
            const row = {};
            let hasData = false;
            expectedHeaders.forEach((eh, ei) => {
              const colIdx = mapping[ei];
              const val = colIdx !== undefined ? String(json[r][colIdx] || "").trim() : "";
              row[eh] = val;
              if (val) hasData = true;
            });
            if (hasData) rows.push(row);
          }

          if (rows.length === 0) { alert("No data rows found in the uploaded file."); return; }
          callback(rows);
        } catch (ex) {
          alert("Unable to read the file. Please use the downloaded template format (.xlsx or .csv).");
          console.error("TemplateHelper parse error:", ex);
        }
      };
      reader.readAsArrayBuffer(file);
    },

    /** Render a download/upload bar for a step section */
    renderBar(containerId, templateName, headers, exampleRow, onUpload) {
      return `
        <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;">
          <button class="btn btn-sm btn-secondary" style="font-size:12px;" onclick="TemplateHelper.downloadTemplate('${templateName}.xlsx', ${JSON.stringify(headers).replace(/'/g, "\\'")}${exampleRow ? ", " + JSON.stringify(exampleRow).replace(/'/g, "\\'") : ""})">📥 Download Template</button>
          <button class="btn btn-sm btn-secondary" style="font-size:12px;" onclick="document.getElementById('tpl-upload-${containerId}').click()">📤 Upload Filled Template</button>
          <input type="file" id="tpl-upload-${containerId}" accept=".xlsx,.xls,.csv" style="display:none;">
          <span style="font-size:12px;color:#666;">Fill out the template in Excel, then upload it here.</span>
        </div>`;
    }
  };

  const StateStore = {
    state: null,

    createFreshState() {
      return {
        version: 1,
        lastStep: "",
        masterData: {},
        selectedCategories: [],
        stepData: {},
      };
    },

    init() {
      this.state = this.createFreshState();
    },

    saveState() {
      try {
        localStorage.setItem("configWizardState", JSON.stringify(this.state));
      } catch (e) {
        if (e.name === "QuotaExceededError" || e.code === 22) {
          console.warn("StateStore: localStorage quota exceeded. Use Export Progress to save your work.");
        } else {
          console.warn("StateStore: Unable to save to localStorage.", e);
        }
      }
    },

    loadState() {
      try {
        const raw = localStorage.getItem("configWizardState");
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) {
        console.warn("StateStore: Unable to read from localStorage.", e);
        return null;
      }
    },

    clearState() {
      try {
        localStorage.removeItem("configWizardState");
      } catch (e) {
        console.warn("StateStore: Unable to clear localStorage.", e);
      }
      this.state = this.createFreshState();
    },

    isLocalStorageAvailable() {
      try {
        const key = "__cw_test__";
        localStorage.setItem(key, "1");
        localStorage.removeItem(key);
        return true;
      } catch (e) {
        return false;
      }
    },
  };


  /* ==========================================================
     TASK 2.2 — Step Manager
     ========================================================== */

  const StepManager = {
    steps: [],
    currentIndex: 0,

    /** Build the step sequence: Welcome + selected category steps (sorted by ID) + Review */
    buildSteps(selectedCategories) {
      const sorted = [...selectedCategories].sort((a, b) => a - b);
      this.steps = [WelcomeStep];
      sorted.forEach(catId => {
        const step = categoryStepRegistry[catId];
        if (step) this.steps.push(step);
      });
      this.steps.push(ReviewStep);
      this.currentIndex = 0;
    },

    getCurrentStep() {
      return this.steps[this.currentIndex] || null;
    },

    goNext() {
      const current = this.getCurrentStep();
      if (!current) return;

      // Validate current step
      const result = current.validate();
      if (!result.valid) return;

      // Save step data to state
      if (current.getData) {
        StateStore.state.stepData[current.id] = current.getData();
      }

      // Special: if on Welcome, rebuild steps from selected categories
      if (current.id === "welcome") {
        const data = current.getData();
        StateStore.state.masterData = {
          companyName: data.companyName,
          marketplace: data.marketplace,
          rootGroupPath: data.rootGroupPath,
          groups: data.groups || [],
          groupSettings: data.groupSettings || {},
        };
        StateStore.state.selectedCategories = data.selectedCategories;
        this.buildSteps(data.selectedCategories);
        this.currentIndex = 1; // move past Welcome
      } else if (this.currentIndex < this.steps.length - 1) {
        this.currentIndex++;
      }

      StateStore.state.lastStep = this.getCurrentStep().id;
      StateStore.saveState();
      this.renderCurrentStep();
      this.updateProgressBar();
      this.updateButtons();
    },

    goBack() {
      if (this.currentIndex <= 0) return;

      // Save current step data before going back
      const current = this.getCurrentStep();
      if (current && current.getData) {
        StateStore.state.stepData[current.id] = current.getData();
      }

      this.currentIndex--;
      StateStore.state.lastStep = this.getCurrentStep().id;
      StateStore.saveState();
      this.renderCurrentStep();
      this.updateProgressBar();
      this.updateButtons();
    },

    goToStep(index) {
      if (index < 0 || index >= this.steps.length) return;
      // Only allow navigation to completed or current steps
      if (index > this.currentIndex) return;

      // Save current step data
      const current = this.getCurrentStep();
      if (current && current.getData) {
        StateStore.state.stepData[current.id] = current.getData();
      }

      this.currentIndex = index;
      StateStore.state.lastStep = this.getCurrentStep().id;
      StateStore.saveState();
      this.renderCurrentStep();
      this.updateProgressBar();
      this.updateButtons();
    },

    renderCurrentStep() {
      const container = document.getElementById("stepContent");
      container.innerHTML = "";
      const step = this.getCurrentStep();
      if (step) {
        try {
          step.render(container);
          // Restore data if available
          if (step.setData && StateStore.state.stepData[step.id]) {
            step.setData(StateStore.state.stepData[step.id]);
          }
        } catch (err) {
          console.error("Step render error (" + step.id + "):", err);
          container.innerHTML = `
            <h2 style="color:#D13212;">⚠ Step failed to load</h2>
            <p style="color:#555;margin:12px 0;">An error occurred rendering the <strong>${step.label}</strong> step.</p>

      }
    },

    updateProgressBar() {
      const bar = document.getElementById("progressBar");
      bar.innerHTML = "";
      this.steps.forEach((step, i) => {
        if (i > 0) {
          const conn = document.createElement("div");
          conn.className = "progress-connector" + (i <= this.currentIndex ? " completed-line" : "");
          bar.appendChild(conn);
        }
        const el = document.createElement("div");
        el.className = "progress-step";
        let icon = "○";
        if (i < this.currentIndex) {
          el.classList.add("completed");
          icon = "✓";
        } else if (i === this.currentIndex) {
          el.classList.add("current");
          icon = "●";
        } else {
          el.classList.add("future");
        }
        el.textContent = icon + " " + step.label;
        if (i <= this.currentIndex) {
          el.addEventListener("click", () => this.goToStep(i));
        }
        bar.appendChild(el);
      });
    },

    updateButtons() {
      const btnBack = document.getElementById("btnBack");

      if (this.currentIndex === this.steps.length - 1) {

    _syncSubgroupVisibility() {
      document.querySelectorAll(".subgroup-container").forEach(sc => {
        sc.style.display = this._subgroupsEnabled ? "block" : "none";
      });

    _addSubgroupRow(subContainer, addBtn, name) {
      // Count existing subgroup rows in this container (max 3 levels)
      const existing = subContainer.querySelectorAll(".subgroup-row");
      if (existing.length >= 3) {
        alert("Maximum of 3 subgroup levels reached for this group.");
        return;
      }
      const level = existing.length + 1;
      const row = document.createElement("div");
      row.className = "subgroup-row";
      row.dataset.level = level;
      row.innerHTML = `
        <span style="font-size:11px;color:#888;min-width:20px;text-align:right;">L${level}</span>
        <input type="text" placeholder="Subgroup Level ${level}" class="subgroup-name-input" value="${name || ""}" style="flex:1;padding:8px 10px;border:1px solid #CCC;border-radius:4px;font-size:13px;min-height:38px;">
        <div class="full-path"></div>
        <button class="btn-remove" title="Remove subgroup" onclick="WelcomeStep._removeSubgroupRow(this)">✕</button>
      `;
      subContainer.insertBefore(row, addBtn);
      row.querySelector(".subgroup-name-input").addEventListener("input", () => this._updateAllPaths());
      // Hide add button if at max
      if (subContainer.querySelectorAll(".subgroup-row").length >= 3) {
        addBtn.style.display = "none";
      }
      this._updateAllPaths();
    },

    _removeSubgroupRow(btn) {
      const row = btn.closest(".subgroup-row");
      const subContainer = row.closest(".subgroup-container");
      row.remove();
      // Re-number remaining levels
      subContainer.querySelectorAll(".subgroup-row").forEach((r, i) => {
        r.dataset.level = i + 1;
        r.querySelector("span").textContent = "L" + (i + 1);
        r.querySelector(".subgroup-name-input").placeholder = "Subgroup Level " + (i + 1);
      });
      // Show add button again if under max
      const addBtn = subContainer.querySelector(".btn-add-subgroup");
      if (addBtn && subContainer.querySelectorAll(".subgroup-row").length < 3) {
        addBtn.style.display = "";
      }
      this._updateAllPaths();
    },

    toggleBulkText() {
      const area = document.getElementById("bulkTextArea");
      area.style.display = area.style.display === "none" ? "block" : "none";
    },

    importBulkText() {
      const text = (document.getElementById("inp-bulkGroups") || {}).value || "";
      // Split by newlines, commas, or semicolons
      const names = text.split(/[\n,;]+/).map(s => s.trim()).filter(s => s.length > 0);
      if (names.length === 0) return;
      // Deduplicate against existing groups
      const existing = new Set();
      document.querySelectorAll(".group-name-input").forEach(inp => {
        if (inp.value.trim()) existing.add(inp.value.trim().toLowerCase());
      });
      let added = 0;
      names.forEach(name => {
        if (!existing.has(name.toLowerCase())) {
          this.addGroupRow(name);
          existing.add(name.toLowerCase());
          added++;
        }
      });
      // Clear the textarea and show count
      document.getElementById("inp-bulkGroups").value = "";
      document.getElementById("bulkTextArea").style.display = "none";
      if (added > 0) {
        alert(added + " group(s) added successfully!");
      } else {
        alert("No new groups to add (all names already exist).");
      }
    },

    triggerGroupFileUpload() {
      const fi = document.getElementById("groupFileInput");
      // Wire the change event (re-wire each time to handle re-uploads)
      fi.onchange = (e) => {
        if (!e.target.files.length) return;
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            let names = [];
            const ext = file.name.split(".").pop().toLowerCase();
            if (ext === "txt") {
              // Plain text: split by newlines/commas
              names = ev.target.result.split(/[\n,;]+/).map(s => s.trim()).filter(s => s.length > 0);
            } else {
              // CSV/Excel: parse with SheetJS, take first column
              const data = new Uint8Array(ev.target.result);
              const wb = XLSX.read(data, { type: "array" });
              const ws = wb.Sheets[wb.SheetNames[0]];
              const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
              // Skip header row if it looks like a header
              const startRow = (json.length > 1 && typeof json[0][0] === "string" &&
                json[0][0].toLowerCase().includes("group")) ? 1 : 0;
              for (let r = startRow; r < json.length; r++) {
                const val = String(json[r][0] || "").trim();
                if (val) names.push(val);
              }
            }
            if (names.length === 0) {
              alert("No group names found in the file.");
              return;
            }
            // Deduplicate
            const existing = new Set();
            document.querySelectorAll(".group-name-input").forEach(inp => {
              if (inp.value.trim()) existing.add(inp.value.trim().toLowerCase());
            });
            let added = 0;
            names.forEach(name => {
              if (!existing.has(name.toLowerCase())) {
                this.addGroupRow(name);
                existing.add(name.toLowerCase());
                added++;
              }
            });
            alert(added + " group(s) imported from " + file.name + "!");
          } catch (ex) {
            alert("Unable to read the file. Please use a .csv, .xlsx, .xls, or .txt file with group names.");
          }
        };
        if (file.name.endsWith(".txt")) {
          reader.readAsText(file);
        } else {
          reader.readAsArrayBuffer(file);
        }
        // Reset input so same file can be re-uploaded
        fi.value = "";
      };
      fi.click();
    },

    _updateAllPaths() {
      const root = (document.getElementById("inp-rootGroupPath") || {}).value || "";
      let hasGroups = false;
      document.querySelectorAll(".group-row-wrapper").forEach(wrapper => {
        const mainRow = wrapper.querySelector(".group-row");
        const groupName = mainRow.querySelector(".group-name-input").value;
        const pathEl = mainRow.querySelector(".full-path");
        const groupPath = groupName ? (root ? root + "/" + groupName : groupName) : (root || "—");
        pathEl.textContent = groupPath;
        if (groupName.trim()) hasGroups = true;

        // Update subgroup paths
        let parentPath = groupPath;
        wrapper.querySelectorAll(".subgroup-row").forEach(subRow => {
          const subName = subRow.querySelector(".subgroup-name-input").value;
          const subPathEl = subRow.querySelector(".full-path");
          if (subName) {
            parentPath = (parentPath && parentPath !== "—") ? parentPath + "/" + subName : subName;
            subPathEl.textContent = parentPath;
          } else {
            subPathEl.textContent = parentPath || "—";
          }
        });
      });
      // Show/hide subgroup toggle based on whether groups exist
      const toggleArea = document.getElementById("subgroupToggleArea");
      if (toggleArea) {
        toggleArea.style.display = hasGroups ? "block" : "none";
        // If no groups and subgroups were enabled, hide the banner too
        if (!hasGroups) {
          const banner = document.getElementById("subgroupBanner");
          if (banner) banner.style.display = "none";
        }
      }
      this._rebuildGroupSettings();
    },

    _rebuildGroupSettings() {
      const root = (document.getElementById("inp-rootGroupPath") || {}).value || "";
      const groups = [];
      document.querySelectorAll(".group-row-wrapper").forEach(wrapper => {
        const mainRow = wrapper.querySelector(".group-row");
        const name = mainRow.querySelector(".group-name-input").value.trim();
        if (name) {
          const groupPath = root ? root + "/" + name : name;
          groups.push(groupPath);
          // Collect subgroup paths
          let parentPath = groupPath;
          wrapper.querySelectorAll(".subgroup-row").forEach(subRow => {
            const subName = subRow.querySelector(".subgroup-name-input").value.trim();
            if (subName) {
              parentPath = parentPath + "/" + subName;
              groups.push(parentPath);
            }
          });
        }
      });
      const panel = document.getElementById("groupSettingsPanel");
      const container = document.getElementById("groupSettingsRows");
      if (!panel || !container) return;

      if (groups.length === 0 && !root) {
        panel.style.display = "none";
        return;
      }
      panel.style.display = "block";

      // Preserve existing selections
      const existing = {};
      container.querySelectorAll(".gs-row").forEach(row => {
        const path = row.dataset.path;
        const addr = row.querySelector(".gs-addr");
        const pay = row.querySelector(".gs-pay");
        if (path) existing[path] = { addr: addr ? addr.value : "", pay: pay ? pay.value : "" };
      });

      container.innerHTML = "";
      const allPaths = root ? [root + " (Root)"] : [];
      groups.forEach(g => allPaths.push(g));

      allPaths.forEach(p => {
        const prev = existing[p] || {};
        const div = document.createElement("div");
        div.className = "gs-row";
        div.dataset.path = p;
        div.style.cssText = "display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid #EEE;";
        div.innerHTML = '<div style="font-size:13px;font-weight:600;">' + p + '</div>' +
          '<select class="gs-addr" style="padding:6px 8px;border:1px solid #CCC;border-radius:4px;font-size:13px;min-height:36px;">' +
            '<option value="">Addresses —</option><option value="Shared"' + (prev.addr === "Shared" ? " selected" : "") + '>Shared</option><option value="Individual"' + (prev.addr === "Individual" ? " selected" : "") + '>Individual</option><option value="Both"' + (prev.addr === "Both" ? " selected" : "") + '>Both</option></select>' +
          '<select class="gs-pay" style="padding:6px 8px;border:1px solid #CCC;border-radius:4px;font-size:13px;min-height:36px;">' +
            '<option value="">Payments —</option><option value="Shared"' + (prev.pay === "Shared" ? " selected" : "") + '>Shared</option><option value="Individual"' + (prev.pay === "Individual" ? " selected" : "") + '>Individual</option><option value="Both"' + (prev.pay === "Both" ? " selected" : "") + '>Both</option></select>';
        container.appendChild(div);
      });
    },

    _applyAllGroupSettings(type) {
      const cls = type === "addresses" ? "gs-addr" : "gs-pay";
      const label = type === "addresses" ? "Addresses" : "Payments";
      const val = prompt("Apply to all groups — select:\n1 = Shared\n2 = Individual\n3 = Both\n\nEnter 1, 2, or 3:");
      if (val === "1" || val === "2" || val === "3") {

      modal.innerHTML = `

    _clearError(field) {
      const fg = document.getElementById("fg-" + field);
      if (fg) fg.classList.remove("has-error");
    },

    validate() {
      const errors = [];
      const companyName = document.getElementById("inp-companyName").value.trim();
      const marketplace = document.getElementById("inp-marketplace").value;
      const rootGroupPath = document.getElementById("inp-rootGroupPath").value.trim();

      // Clear all errors first
      ["companyName", "marketplace", "rootGroupPath", "categories"].forEach(f => this._clearError(f));

      if (!VALIDATION_RULES.required(companyName)) {
        document.getElementById("fg-companyName").classList.add("has-error");
        errors.push("Company Name is required");
      }
      if (!VALIDATION_RULES.required(marketplace)) {
        document.getElementById("fg-marketplace").classList.add("has-error");
        errors.push("Please select a marketplace");
      }
      if (!VALIDATION_RULES.required(rootGroupPath)) {
        document.getElementById("fg-rootGroupPath").classList.add("has-error");
        errors.push("Root Group Path is required");
      }

      const selected = this._getSelectedCategories();
      if (selected.length === 0) {
        document.getElementById("fg-categories").classList.add("has-error");
        errors.push("Please select at least one feature category");
      }

      if (errors.length > 0) {
        // Scroll to first error
        const firstErr = document.querySelector(".has-error");
        if (firstErr) firstErr.scrollIntoView({ behavior: "smooth", block: "center" });
      }

      return { valid: errors.length === 0, errors };
    },

    _getSelectedCategories() {
      const cats = [];
      document.querySelectorAll("#categoryGrid input[type=checkbox]:checked").forEach(cb => {
        cats.push(parseInt(cb.value, 10));
      });
      return cats;
    },

    _getGroupSettings() {
      const settings = {};
      document.querySelectorAll(".gs-row").forEach(row => {
        const path = row.dataset.path;
        const addr = row.querySelector(".gs-addr");
        const pay = row.querySelector(".gs-pay");
        if (path) settings[path] = { addresses: addr ? addr.value : "", payments: pay ? pay.value : "" };
      });
      return settings;
    },

    getData() {
      const groups = [];
      const root = (document.getElementById("inp-rootGroupPath") || {}).value || "";
      document.querySelectorAll(".group-row-wrapper").forEach(wrapper => {
        const mainRow = wrapper.querySelector(".group-row");
        const name = mainRow.querySelector(".group-name-input").value.trim();
        if (name) {
          const groupPath = root ? root + "/" + name : name;
          groups.push({ name, fullPath: groupPath, parentPath: root });
          // Collect subgroups
          let parentPath = groupPath;
          wrapper.querySelectorAll(".subgroup-row").forEach(subRow => {
            const subName = subRow.querySelector(".subgroup-name-input").value.trim();
            if (subName) {
              const subFullPath = parentPath + "/" + subName;
              groups.push({ name: subName, fullPath: subFullPath, parentPath: parentPath, isSubgroup: true });
              parentPath = subFullPath;
            }
          });
        }
      });
      return {
        companyName: (document.getElementById("inp-companyName") || {}).value || "",
        marketplace: (document.getElementById("inp-marketplace") || {}).value || "",
        rootGroupPath: (document.getElementById("inp-rootGroupPath") || {}).value || "",
        groups,
        subgroupsEnabled: this._subgroupsEnabled,
        selectedCategories: this._getSelectedCategories(),
        groupSettings: this._getGroupSettings(),
      };
    },

    setData(data) {
      if (!data) return;
      if (data.companyName) document.getElementById("inp-companyName").value = data.companyName;
      if (data.marketplace) document.getElementById("inp-marketplace").value = data.marketplace;
      if (data.rootGroupPath) {
        document.getElementById("inp-rootGroupPath").value = data.rootGroupPath;
      }
      // Restore subgroups toggle state
      if (data.subgroupsEnabled) {
        this._subgroupsEnabled = false; // toggleSubgroups will flip it
        this.toggleSubgroups();
      }
      // Restore groups and their subgroups
      if (data.groups && data.groups.length) {
        // Separate top-level groups from subgroups
        const topGroups = data.groups.filter(g => !g.isSubgroup);
        topGroups.forEach(g => {
          this.addGroupRow(g.name);
          // Find direct chain of subgroups belonging to this group
          // Subgroups have parentPath that exactly matches the group or a prior subgroup in the chain
          const groupPath = g.fullPath;
          const subs = [];
          let chainPath = groupPath;
          data.groups.forEach(sg => {
            if (sg.isSubgroup && sg.parentPath === chainPath) {
              subs.push(sg);
              chainPath = sg.fullPath;
            }
          });
          if (subs.length > 0) {
            const wrapper = document.getElementById("groupRows").lastElementChild;
            const subContainer = wrapper.querySelector(".subgroup-container");
            const addBtn = subContainer.querySelector(".btn-add-subgroup");
            subs.forEach(sg => {
              this._addSubgroupRow(subContainer, addBtn, sg.name);
            });
          }
        });
      }
      // Restore selected categories
      if (data.selectedCategories) {
        data.selectedCategories.forEach(id => {
          const cb = document.getElementById("cat-" + id);
          if (cb) {
            cb.checked = true;
            cb.closest(".category-card").classList.add("selected");
          }
        });
      }
      // Restore group settings
      if (data.groupSettings) {
        setTimeout(() => {
          document.querySelectorAll(".gs-row").forEach(row => {
            const path = row.dataset.path;
            const s = data.groupSettings[path];
            if (s) {
              const addr = row.querySelector(".gs-addr");
              const pay = row.querySelector(".gs-pay");
              if (addr && s.addresses) addr.value = s.addresses;
              if (pay && s.payments) pay.value = s.payments;
            }
          });
        }, 50);
      }
      // Wire root path changes to update group paths
      document.getElementById("inp-rootGroupPath").addEventListener("input", () => this._updateAllPaths());
    },
  };

  const FileUploadMapper = {
    create(containerId, expectedFields, onConfirm) {
      return {
        containerId,
        expectedFields, // [{key, label}]
        onConfirm,
        parsedHeaders: [],
        parsedRows: [],
        mappings: {},
        confirmed: false,
        mappedData: [],

        render(parentEl) {
          const div = document.createElement("div");
          div.id = this.containerId;
          div.innerHTML = `
            <div class="upload-zone" id="${this.containerId}-dropzone" style="border:2px dashed #CCC;border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:border-color 0.2s;background:#FAFAFA;">
              <p style="font-size:16px;color:#555;">📁 Drag & drop a file here, or click to browse</p>
              <p style="font-size:12px;color:#999;margin-top:4px;">Accepts .csv, .xlsx, .xls</p>
              <input type="file" accept=".csv,.xlsx,.xls" style="display:none;" id="${this.containerId}-fileInput">
            </div>
            <div id="${this.containerId}-error" style="color:#D13212;margin-top:8px;display:none;"></div>
            <div id="${this.containerId}-preview" style="display:none;margin-top:16px;"></div>
            <div id="${this.containerId}-mapping" style="display:none;margin-top:16px;"></div>
            <div id="${this.containerId}-datatable" style="display:none;margin-top:16px;"></div>
          `;
          parentEl.appendChild(div);
          this._wireEvents();
        },

        _wireEvents() {
          const dz = document.getElementById(this.containerId + "-dropzone");
          const fi = document.getElementById(this.containerId + "-fileInput");
          dz.addEventListener("click", () => fi.click());
          dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.style.borderColor = "#E47911"; });
          dz.addEventListener("dragleave", () => { dz.style.borderColor = "#CCC"; });
          dz.addEventListener("drop", (e) => { e.preventDefault(); dz.style.borderColor = "#CCC"; if (e.dataTransfer.files.length) this._handleFile(e.dataTransfer.files[0]); });
          fi.addEventListener("change", (e) => { if (e.target.files.length) this._handleFile(e.target.files[0]); });
        },

        _handleFile(file) {
          const errEl = document.getElementById(this.containerId + "-error");
          errEl.style.display = "none";
          const ext = file.name.split(".").pop().toLowerCase();
          if (!["csv","xlsx","xls"].includes(ext)) {
            errEl.textContent = "Unrecognized file format. Please upload a .csv, .xlsx, or .xls file.";
            errEl.style.display = "block";
            return;
          }
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const data = new Uint8Array(e.target.result);
              const wb = XLSX.read(data, { type: "array" });
              const ws = wb.Sheets[wb.SheetNames[0]];
              const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
              if (!json.length || json.length < 2) {
                errEl.textContent = "No data rows found in the uploaded file.";
                errEl.style.display = "block";
                return;
              }
              this.parsedHeaders = json[0].map(h => String(h).trim());
              this.parsedRows = json.slice(1).map(row => row.map(c => String(c).trim()));
              // Update dropzone to show filename
              const dz = document.getElementById(this.containerId + "-dropzone");
              dz.innerHTML = `<p style="color:#067D62;">✓ <strong>${file.name}</strong> — ${this.parsedRows.length} rows, ${this.parsedHeaders.length} columns</p><p style="font-size:12px;color:#999;margin-top:4px;">Drop another file to replace</p><input type="file" accept=".csv,.xlsx,.xls" style="display:none;" id="${this.containerId}-fileInput">`;
              this._wireEvents();
              this._showPreview();
              this._showMapping();
            } catch (ex) {
              errEl.textContent = "Unable to read this file. Please check the file format and try again.";
              errEl.style.display = "block";
            }
          };
          reader.readAsArrayBuffer(file);
        },

        _showPreview() {
          const el = document.getElementById(this.containerId + "-preview");
          const previewRows = this.parsedRows.slice(0, 5);
          let html = `<h4 style="margin-bottom:8px;">Preview (first ${previewRows.length} rows)</h4><div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr>`;
          this.parsedHeaders.forEach(h => { html += `<th style="border:1px solid #DDD;padding:6px 8px;background:#F5F5F5;white-space:nowrap;">${h}</th>`; });
          html += `</tr></thead><tbody>`;
          previewRows.forEach(row => {
            html += "<tr>";
            this.parsedHeaders.forEach((_, ci) => { html += `<td style="border:1px solid #EEE;padding:6px 8px;">${row[ci] || ""}</td>`; });
            html += "</tr>";
          });
          html += "</tbody></table></div>";
          el.innerHTML = html;
          el.style.display = "block";
        },

        _showMapping() {
          const el = document.getElementById(this.containerId + "-mapping");
          this._autoDetect();
          let html = `<h4 style="margin-bottom:8px;">Column Mapping</h4><p style="font-size:13px;color:#666;margin-bottom:12px;">Map each expected field to a column from your file.</p>`;
          this.expectedFields.forEach(f => {
            const selVal = this.mappings[f.key] !== undefined ? this.mappings[f.key] : "";
            html += `<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
              <label style="min-width:140px;font-weight:600;font-size:13px;">${f.label}</label>
              <select id="${this.containerId}-map-${f.key}" style="flex:1;padding:8px;border:1px solid #CCC;border-radius:4px;min-height:36px;" data-field="${f.key}">
                <option value="">— Select column —</option>
                ${this.parsedHeaders.map((h, i) => `<option value="${i}" ${selVal === i ? "selected" : ""}>${h}</option>`).join("")}
              </select>
            </div>`;
          });
          html += `<button class="btn btn-sm btn-primary" id="${this.containerId}-confirmBtn" style="margin-top:8px;">Confirm Mapping</button>`;
          el.innerHTML = html;
          el.style.display = "block";
          document.getElementById(this.containerId + "-confirmBtn").addEventListener("click", () => this._confirmMapping());
        },

        _autoDetect() {
          this.mappings = {};
          this.expectedFields.forEach(f => {
            const needle = f.label.toLowerCase();
            const matches = [];
            this.parsedHeaders.forEach((h, i) => {
              if (h.toLowerCase().includes(needle) || needle.includes(h.toLowerCase())) matches.push(i);
            });
            if (matches.length === 1) this.mappings[f.key] = matches[0];
          });
        },

        _confirmMapping() {
          // Read current selections
          this.expectedFields.forEach(f => {
            const sel = document.getElementById(this.containerId + "-map-" + f.key);
            if (sel && sel.value !== "") this.mappings[f.key] = parseInt(sel.value, 10);
            else delete this.mappings[f.key];
          });
          // Transform data
          this.mappedData = this.parsedRows.map(row => {
            const obj = {};
            this.expectedFields.forEach(f => {
              obj[f.key] = this.mappings[f.key] !== undefined ? (row[this.mappings[f.key]] || "") : "";
            });
            return obj;
          });
          this.confirmed = true;
          this._showDataTable();
          if (this.onConfirm) this.onConfirm(this.mappedData);
        },

        _showDataTable() {
          const el = document.getElementById(this.containerId + "-datatable");
          // Only show columns that were actually mapped
          const mappedFields = this.expectedFields.filter(f => this.mappings[f.key] !== undefined);
          const displayFields = mappedFields.length > 0 ? mappedFields : this.expectedFields;
          let html = `<h4 style="margin-bottom:8px;">Mapped Data (${this.mappedData.length} rows)</h4><div style="overflow-x:auto;max-height:400px;overflow-y:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;" id="${this.containerId}-table"><thead><tr>`;
          html += `<th style="border:1px solid #DDD;padding:6px 8px;background:#F5F5F5;">#</th>`;
          displayFields.forEach(f => { html += `<th style="border:1px solid #DDD;padding:6px 8px;background:#F5F5F5;white-space:nowrap;">${f.label}</th>`; });
          html += `</tr></thead><tbody>`;
          this.mappedData.forEach((row, ri) => {
            html += `<tr>`;
            html += `<td style="border:1px solid #EEE;padding:4px 8px;color:#999;">${ri + 1}</td>`;
            displayFields.forEach(f => {
              html += `<td style="border:1px solid #EEE;padding:2px 4px;"><input type="text" value="${(row[f.key] || "").replace(/"/g, "&quot;")}" data-row="${ri}" data-field="${f.key}" style="width:100%;border:1px solid transparent;padding:4px;font-size:13px;border-radius:2px;" onfocus="this.style.borderColor='#E47911'" onblur="this.style.borderColor='transparent'"></td>`;
            });
            html += `</tr>`;
          });
          html += `</tbody></table></div>`;
          el.innerHTML = html;
          el.style.display = "block";
          // Hide mapping section
          document.getElementById(this.containerId + "-mapping").style.display = "none";
          // Wire edits
          el.querySelectorAll("input[data-row]").forEach(inp => {
            inp.addEventListener("change", (e) => {
              const ri = parseInt(e.target.dataset.row, 10);
              const fk = e.target.dataset.field;
              this.mappedData[ri][fk] = e.target.value;
            });
          });
        },

        getState() {
          return { parsedHeaders: this.parsedHeaders, parsedRows: this.parsedRows, mappings: this.mappings, confirmed: this.confirmed, mappedData: this.mappedData };
        },

        setState(s) {
          if (!s) return;
          this.parsedHeaders = s.parsedHeaders || [];
          this.parsedRows = s.parsedRows || [];
          this.mappings = s.mappings || {};
          this.confirmed = s.confirmed || false;
          this.mappedData = s.mappedData || [];
          if (this.confirmed && this.mappedData.length) {
            const dz = document.getElementById(this.containerId + "-dropzone");
            if (dz) dz.innerHTML = `<p style="color:#067D62;">✓ File loaded — ${this.parsedRows.length} rows</p><input type="file" accept=".csv,.xlsx,.xls" style="display:none;" id="${this.containerId}-fileInput">`;
            this._wireEvents();
            this._showDataTable();
          } else if (this.parsedHeaders.length) {
            this._showPreview();
            this._showMapping();
          }
        }
      };
    }
  };

              const gpHtml = SearchableSelect.buildSingle(gpOpts, curGroup, "", "— Select —");
              html += `<td style="border:1px solid #EEE;padding:2px 4px;" class="ga-group-cell" data-row="${ri}">${gpHtml}</td>`;
            }

            this._extraColumns.forEach(ec => { html += `<td style="border:1px solid #EEE;padding:2px 4px;">${ec.renderCell(ri)}</td>`; });
            html += `</tr>`;
          });
          html += `</tbody></table></div>`;
          div.innerHTML = html;
          parentEl.appendChild(div);
          SearchableSelect.initAll(div);

          // Wire events
          if (this.multiGroupRole) {
            this._wireMultiGroupEvents(div, paths);
            // Helper to get checked groups and roles from bulk area
            const _getCheckedBulk = () => {
              const groups = []; const roles = [];
              div.querySelectorAll(".bulk-grp-cb:checked").forEach(cb => groups.push(cb.value));
              div.querySelectorAll(".bulk-role-cb:checked").forEach(cb => roles.push(cb.value));
              return { groups, roles };
            };
            const _applyToRows = (rowIndices) => {
              const { groups, roles } = _getCheckedBulk();
              if (groups.length === 0) { alert("Please select at least one group."); return; }
              if (roles.length === 0) { alert("Please select at least one role."); return; }
              let added = 0;
              rowIndices.forEach(ri => {
                if (!this.assignments[ri]) this.assignments[ri] = [];
                groups.forEach(g => {
                  roles.forEach(r => {
                    if (!this.assignments[ri].some(p => p.group === g && p.role === r)) {
                      this.assignments[ri].push({ group: g, role: r }); added++;
                    }
                  });
                });
                this._refreshMultiGroupCell(ri, paths);
              });
            };
            // Apply to all unassigned
            document.getElementById(this.containerId + "-bulkBtn").addEventListener("click", () => {
              const unassigned = [];
              mappedData.forEach((_, ri) => { if (!this.assignments[ri] || this.assignments[ri].length === 0) unassigned.push(ri); });
              if (unassigned.length === 0) { alert("All users already have group assignments."); return; }
              _applyToRows(unassigned);
            });
            // Apply to row-checkbox selected
            const selAll = div.querySelector(".mga-select-all");
            if (selAll) selAll.addEventListener("change", (e) => {
              div.querySelectorAll(".mga-row-cb").forEach(cb => { cb.checked = e.target.checked; });

            document.getElementById(this.containerId + "-applySelectedBtn").addEventListener("click", () => {
              const selected = [];
              div.querySelectorAll(".mga-row-cb:checked").forEach(cb => { selected.push(parseInt(cb.dataset.row, 10)); cb.checked = false; });
              if (selected.length === 0) { alert("Please check at least one user row in the table."); return; }
              _applyToRows(selected);
              if (selAll) selAll.checked = false;

            // Assign to specific users toggle
            document.getElementById(this.containerId + "-specificUsersToggle").addEventListener("click", () => {
              const panel = document.getElementById(this.containerId + "-specificUsersPanel");
              const isHidden = panel.style.display === "none";
              panel.style.display = isHidden ? "block" : "none";
              if (isHidden) {
                // Populate user checkboxes
                const container = document.getElementById(this.containerId + "-userCheckboxes");
                container.innerHTML = mappedData.map((row, ri) => {
                  const email = row.email || row.Email || `User ${ri + 1}`;
                  const name = [row.firstName, row.lastName].filter(Boolean).join(" ");
                  const label = name ? `${email} (${name})` : email;
                  return `<label style="display:flex;align-items:center;gap:6px;padding:4px 8px;cursor:pointer;font-size:12px;border-bottom:1px solid #F5F5F5;">
                    <input type="checkbox" class="specific-user-cb" data-row="${ri}"> ${label}
                  </label>`;
                }).join("");
              }
            });
            document.getElementById(this.containerId + "-applySpecificBtn").addEventListener("click", () => {
              const selected = [];
              document.querySelectorAll("#" + this.containerId + "-userCheckboxes .specific-user-cb:checked").forEach(cb => {
                selected.push(parseInt(cb.dataset.row, 10)); cb.checked = false;
              });
              if (selected.length === 0) { alert("Please select at least one user."); return; }
              _applyToRows(selected);
              document.getElementById(this.containerId + "-specificUsersPanel").style.display = "none";
            });
            // Role Guide modal
            const roleHelpBtn = document.getElementById(this.containerId + "-roleHelpBtn");
            if (roleHelpBtn) roleHelpBtn.addEventListener("click", () => this._showRoleGuide());
          } else if (this.multiGroup) {
            // Multi-group (no roles): read checkbox selections on change
            div.querySelectorAll(".ga-mg-cell").forEach(cell => {
              const ri = parseInt(cell.dataset.row, 10);
              cell.addEventListener("change", () => {
                const selected = [];
                cell.querySelectorAll('.sa-approver-cb:checked').forEach(cb => selected.push(cb.value));
                this.assignments[ri] = selected;
              });
            });
            document.getElementById(this.containerId + "-bulkBtn").addEventListener("click", () => {
              const bulkWrap = document.getElementById(this.containerId + "-bulkGroup-wrap");
              const hidden = bulkWrap ? bulkWrap.querySelector('input[type="hidden"]') : null;
              const group = hidden ? hidden.value : "";
              if (!group) return;
              div.querySelectorAll(".ga-mg-cell").forEach(cell => {
                const ri = parseInt(cell.dataset.row, 10);
                if (!this.assignments[ri] || this.assignments[ri].length === 0) {
                  this.assignments[ri] = [group];
                  cell.querySelectorAll('.sa-approver-cb').forEach(cb => { cb.checked = cb.value === group; });
                  const wrap = cell.querySelector('[data-ss="multi"]');
                  if (wrap) SearchableSelect._updateMultiDisplay(wrap);
                }
              });
            });
          } else {
            div.querySelectorAll(".ga-group-cell").forEach(cell => {
              const hidden = cell.querySelector('input[type="hidden"]');
              if (hidden) {
                const ri = parseInt(cell.dataset.row, 10);
                hidden.addEventListener("change", () => { this.assignments[ri] = hidden.value; });
              }
            });
            document.getElementById(this.containerId + "-bulkBtn").addEventListener("click", () => {
              const bulkWrap = document.getElementById(this.containerId + "-bulkGroup-wrap");
              const hidden = bulkWrap ? bulkWrap.querySelector('input[type="hidden"]') : null;
              const group = hidden ? hidden.value : "";
              div.querySelectorAll(".ga-group-cell").forEach(cell => {
                const ri = parseInt(cell.dataset.row, 10);
                const hidden = cell.querySelector('input[type="hidden"]');
                if (!this.assignments[ri] && hidden) {
                  this.assignments[ri] = group;
                  hidden.value = group;
                  // Update the display text
                  const display = cell.querySelector('.ss-display');
                  if (display) display.innerHTML = group ? SearchableSelect._esc(group) : '<span class="ss-placeholder">— Select —</span>';
                  // Update selected state in list
                  cell.querySelectorAll('.ss-opt').forEach(o => {
                    o.classList.toggle('ss-selected', o.dataset.val === group);
                  });
                }
              });
            });
          }
        },

        // --- Multi-group+role helpers ---
        _allRoles: ["Requisitioner", "Administrator", "Administrator, Requisitioner", "Technical", "Finance"],

        _renderMultiGroupCell(ri, paths) {
          const pairs = this.assignments[ri] || [];
          let html = '<div class="mga-tags" id="' + this.containerId + '-tags-' + ri + '">';
          pairs.forEach((p, pi) => {
            html += `<span class="mga-tag">${p.group} <em style="color:#666;">(${p.role})</em> <button class="mga-remove" data-row="${ri}" data-pair="${pi}" title="Remove">✕</button></span>`;
          });
          html += '</div>';
          html += `<button class="btn btn-sm btn-secondary" style="margin-top:4px;font-size:12px;padding:4px 10px;min-height:28px;" data-row="${ri}" data-action="mga-add">➕ Add Group</button>`;
          html += `<div class="mga-panel" id="${this.containerId}-addpanel-${ri}" style="display:none;margin-top:6px;background:#F9F9F9;border:1px solid #E0E0E0;border-radius:6px;padding:12px;">
            <div id="${this.containerId}-step1-${ri}">
              <div style="font-weight:600;font-size:12px;margin-bottom:6px;">Select group(s):</div>
              <div style="max-height:150px;overflow-y:auto;border:1px solid #DDD;border-radius:4px;background:#FFF;padding:4px;">
                ${paths.map((p, gi) => `<label style="display:flex;align-items:center;gap:6px;padding:4px 8px;cursor:pointer;font-size:13px;border-bottom:1px solid #F5F5F5;">
                  <input type="checkbox" class="mga-grp-cb" data-row="${ri}" data-group="${p}" value="${gi}"> ${p}
                </label>`).join("")}
              </div>
              <button class="btn btn-sm btn-primary" style="margin-top:8px;font-size:12px;padding:4px 12px;" data-row="${ri}" data-action="mga-next">Next → Select Roles</button>
            </div>
            <div id="${this.containerId}-step2-${ri}" style="display:none;"></div>
          </div>`;
          return html;
        },

        _refreshMultiGroupCell(ri, paths) {
          const cell = document.getElementById(this.containerId + "-mgr-cell-" + ri);
          if (!cell) return;
          cell.innerHTML = this._renderMultiGroupCell(ri, paths);
          this._wireMultiGroupCellEvents(cell, paths);
        },

        _wireMultiGroupEvents(container, paths) {
          this._wireMultiGroupCellEvents(container, paths);
        },

        _wireMultiGroupCellEvents(cell, paths) {
          // Toggle add panel
          cell.querySelectorAll('[data-action="mga-add"]').forEach(btn => {
            btn.addEventListener("click", (e) => {
              const ri = parseInt(e.target.dataset.row, 10);
              const panel = document.getElementById(this.containerId + "-addpanel-" + ri);
              if (panel) {
                const isHidden = panel.style.display === "none";
                panel.style.display = isHidden ? "block" : "none";
                // Reset to step 1 when reopening
                if (isHidden) {
                  const s1 = document.getElementById(this.containerId + "-step1-" + ri);
                  const s2 = document.getElementById(this.containerId + "-step2-" + ri);
                  if (s1) s1.style.display = "block";
                  if (s2) s2.style.display = "none";
                  // Uncheck all group checkboxes
                  cell.querySelectorAll('.mga-grp-cb[data-row="' + ri + '"]').forEach(cb => cb.checked = false);
                }
              }
            });
          });
          // Step 1 → Step 2: "Next → Select Roles"
          cell.querySelectorAll('[data-action="mga-next"]').forEach(btn => {
            btn.addEventListener("click", (e) => {
              const ri = parseInt(e.target.dataset.row, 10);
              const selectedGroups = [];
              cell.querySelectorAll('.mga-grp-cb[data-row="' + ri + '"]:checked').forEach(cb => {
                selectedGroups.push(cb.dataset.group);
              });
              if (selectedGroups.length === 0) { alert("Please select at least one group."); return; }
              // Build step 2: for each selected group, show role checkboxes
              const s1 = document.getElementById(this.containerId + "-step1-" + ri);
              const s2 = document.getElementById(this.containerId + "-step2-" + ri);
              if (s1) s1.style.display = "none";
              let html = '<div style="font-weight:600;font-size:12px;margin-bottom:8px;">Assign roles for each group:</div>';
              selectedGroups.forEach((g, gi) => {
                html += `<div style="margin-bottom:10px;padding:8px;background:#FFF;border:1px solid #DDD;border-radius:4px;">
                  <div style="font-weight:600;font-size:12px;color:#232F3E;margin-bottom:4px;">${g}</div>
                  <div style="max-height:120px;overflow-y:auto;border:1px solid #DDD;border-radius:4px;background:#FAFAFA;padding:2px;">`;
                this._allRoles.forEach(role => {
                  html += `<label style="display:flex;align-items:center;gap:6px;padding:4px 8px;cursor:pointer;font-size:12px;border-bottom:1px solid #F0F0F0;">
                    <input type="checkbox" class="mga-role-cb" data-row="${ri}" data-grp-idx="${gi}" data-group="${g}" data-role="${role}"> ${role}
                  </label>`;
                });
                html += `</div></div>`;
              });
              html += `<div style="display:flex;gap:8px;margin-top:8px;">
                <button class="btn btn-sm btn-secondary" style="font-size:12px;padding:4px 12px;" data-row="${ri}" data-action="mga-back">← Back</button>
                <button class="btn btn-sm btn-primary" style="font-size:12px;padding:4px 12px;" data-row="${ri}" data-action="mga-assign">Assign ✓</button>
              </div>`;
              s2.innerHTML = html;
              s2.style.display = "block";
              // Wire step 2 events
              s2.querySelector('[data-action="mga-back"]').addEventListener("click", () => {
                s2.style.display = "none";
                s1.style.display = "block";
              });
              s2.querySelector('[data-action="mga-assign"]').addEventListener("click", () => {
                if (!this.assignments[ri]) this.assignments[ri] = [];
                let added = 0;
                s2.querySelectorAll('.mga-role-cb:checked').forEach(cb => {
                  const group = cb.dataset.group;
                  const role = cb.dataset.role;
                  const exists = this.assignments[ri].some(p => p.group === group && p.role === role);
                  if (!exists) { this.assignments[ri].push({ group, role }); added++; }
                });
                this._refreshMultiGroupCell(ri, paths);
              });
            });
          });
          // Remove tag
          cell.querySelectorAll(".mga-remove").forEach(btn => {
            btn.addEventListener("click", (e) => {
              const ri = parseInt(e.target.dataset.row, 10);
              const pi = parseInt(e.target.dataset.pair, 10);
              if (this.assignments[ri]) {
                this.assignments[ri].splice(pi, 1);
                this._refreshMultiGroupCell(ri, paths);
              }
            });
          });
        },

        _showRoleGuide() {
          const overlay = document.createElement("div");
          overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;";
          overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

          modal.innerHTML = `

                </tr>
                <tr>
                  <td style="padding:10px 12px;border-bottom:1px solid #EEE;font-weight:600;">Group Admin</td>

                  <td style="padding:10px 12px;border-bottom:1px solid #EEE;">Handles financial and accounting tasks</td>
                  <td style="padding:10px 12px;border-bottom:1px solid #EEE;">View all orders in a group and its subgroups; access invoice and payment data; run financial reports</td>
                </tr>
                <tr>
                  <td style="padding:10px 12px;font-weight:600;">Tech (IT)</td>
                  <td style="padding:10px 12px;">Manages technical integrations</td>
                  <td style="padding:10px 12px;">Manage SSO configurations; manage external system integrations (ESI); manage eProcurement settings</td>
                </tr>
              </tbody>
            </table>
          `;
          overlay.appendChild(modal);
          document.body.appendChild(overlay);
        },

        getState() { return { assignments: JSON.parse(JSON.stringify(this.assignments)) }; },
        setState(s) { if (s && s.assignments) this.assignments = JSON.parse(JSON.stringify(s.assignments)); }

  const DeliveryHoursEditor = {
    schedules: {},
    show(rowIndex, onSave) {
      const existing = this.schedules[rowIndex] || {};
      const days = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
      let html = `<div class="modal-overlay" id="dhModal"><div class="modal-box" style="max-width:520px;text-align:left;">
        <h3 style="margin-bottom:16px;">Delivery Hours — Address Row ${rowIndex + 1}</h3>
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr><th style="padding:6px;text-align:left;">Day</th><th style="padding:6px;">Start</th><th style="padding:6px;">End</th></tr></thead><tbody>`;
      days.forEach(d => {
        const dk = d.toLowerCase().substring(0, 3);
        const s = existing[dk] || ["09:00","17:00"];
        html += `<tr><td style="padding:6px;font-weight:600;">${d}</td>
          <td style="padding:6px;"><input type="time" id="dh-${dk}-start" value="${s[0]}" style="padding:4px;border:1px solid #CCC;border-radius:3px;min-height:36px;"></td>
          <td style="padding:6px;"><input type="time" id="dh-${dk}-end" value="${s[1]}" style="padding:4px;border:1px solid #CCC;border-radius:3px;min-height:36px;"></td></tr>`;
      });
      html += `</tbody></table>
        <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px;">
          <button class="btn btn-sm btn-secondary" id="dhCancel">Cancel</button>
          <button class="btn btn-sm btn-primary" id="dhSave">Save</button>
        </div></div></div>`;
      document.body.insertAdjacentHTML("beforeend", html);
      document.getElementById("dhCancel").addEventListener("click", () => document.getElementById("dhModal").remove());
      document.getElementById("dhSave").addEventListener("click", () => {
        const schedule = {};
        days.forEach(d => {
          const dk = d.toLowerCase().substring(0, 3);

  };

  const UsersGroupsStep = {

        </div>

      `;
      const fields = [

        {key:"role",label:"Role"},{key:"department",label:"Department"}

    _renderGroupAssigner(data, fields) {

      area.innerHTML = "";
      this._groupAssigner = GroupAssigner.create("usersGroups", { multiGroupRole: true });
      this._groupAssigner.render(area, data, fields, []);
    },

    validate() {
      if (!this._uploader || !this._uploader.confirmed) {
        return { valid: false, errors: ["Please upload a file and confirm column mappings."] };
      }
      // Check required fields based on Account Authority
      const aaChk = document.getElementById("accountAuthorityChk");
      const isAA = aaChk && aaChk.checked;
      const requiredKeys = isAA ? ["email", "firstName", "lastName"] : ["email"];
      const errors = [];
      const mappedData = this._uploader.mappedData || [];
      for (let ri = 0; ri < mappedData.length; ri++) {
        for (const key of requiredKeys) {
          if (!mappedData[ri][key] || !mappedData[ri][key].trim()) {

        const self = this;
        config.sections.forEach(sec => {

          if (dlBtn) {

              const example = sec.columns.map(c => c.placeholder || "");

            upInput.addEventListener("change", function(e) {
